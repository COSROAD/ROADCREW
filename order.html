<style>
:root{--navy:#0F2A47;--navy-soft:#E8EEF5;--orange:#EA580C;--orange-soft:#FFF4ED;
--ink:#1A2233;--ink-soft:#5A6478;--line:#E4E8EF;--bg:#F6F8FB;--white:#fff;--ok:#12B76A;--err:#F04438;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.top{position:sticky;top:0;z-index:20;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:14px 16px;}
.back{border:none;background:none;font-size:22px;color:var(--ink-soft);cursor:pointer;padding:0 4px;}
.top h1{font-size:16px;font-weight:800;margin:0;flex:1;}
.prog{height:4px;background:var(--line);}
.prog i{display:block;height:100%;background:var(--orange);width:0;transition:.3s;}
.wrap{flex:1;padding:22px 18px 120px;}
.step-title{font-size:24px;font-weight:850;letter-spacing:-.02em;margin:0 0 8px;}
.step-desc{font-size:15px;color:var(--ink-soft);margin:0 0 24px;}
.field{margin-bottom:20px;}
label.lb{display:block;font-size:14px;font-weight:700;margin-bottom:8px;}
.req{color:var(--orange);}
input[type=text],input[type=tel],select,textarea{width:100%;padding:15px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:var(--white);color:var(--ink);font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);}
textarea{min-height:90px;resize:vertical;}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:6px;}
.opts{display:grid;gap:8px;}
.opts.col2{grid-template-columns:1fr 1fr;}
.opt{border:1.5px solid var(--line);background:var(--white);border-radius:12px;padding:14px 12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;}
.opt.on{border-color:var(--navy);background:var(--navy);color:#fff;}
.opt .ico{display:block;font-size:22px;margin-bottom:4px;}
.foot{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--white);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom));}
.btn{width:100%;padding:17px;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-main{background:var(--navy);color:#fff;}
.btn-main:disabled{background:#C4CBD6;cursor:not-allowed;}
.btn-ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--navy);}
.agree-all{border:1.5px solid var(--navy);background:var(--navy-soft);border-radius:12px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;font-weight:800;font-size:16px;}
.agree{display:flex;align-items:flex-start;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.agree:last-child{border-bottom:none;}
.chk{flex:none;width:24px;height:24px;border:2px solid #C4CBD6;border-radius:50%;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;font-weight:900;transition:.15s;}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff;}
.agree .tx{flex:1;font-size:14.5px;}
.tag-req{font-size:11px;color:var(--orange);font-weight:800;}
.tag-opt{font-size:11px;color:var(--ink-soft);font-weight:800;}
.viewmore{font-size:12.5px;color:var(--ink-soft);text-decoration:underline;background:none;border:none;cursor:pointer;padding:4px 0 0;}
.upload{display:block;border:2px dashed #C4CBD6;border-radius:14px;padding:28px 16px;text-align:center;background:var(--white);cursor:pointer;}
.upload .big{font-size:34px;}
.upload p{margin:8px 0 0;font-size:14px;color:var(--ink-soft);}
.preview{position:relative;border-radius:14px;overflow:hidden;border:1.5px solid var(--line);}
.preview img{width:100%;display:block;}
.preview .del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;}
.done{text-align:center;padding:40px 0 10px;}
.done .mark{width:76px;height:76px;border-radius:50%;background:var(--ok);color:#fff;font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px;text-align:left;}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--ink-soft);}
.row .v{font-weight:700;text-align:right;}
.badge{display:inline-block;background:var(--orange-soft);color:var(--orange);font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;margin-left:6px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;}
.modal.on{display:flex;}
.sheet{background:#fff;width:100%;max-width:520px;margin:0 auto;border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto;}
.sheet h3{margin:0 0 14px;font-size:18px;font-weight:850;}
.sheet .body{font-size:14px;color:var(--ink-soft);line-height:1.8;}
.sheet .body b{color:var(--ink);}
.brand{display:flex;align-items:center;justify-content:center;gap:2px;font-weight:900;letter-spacing:-.02em;}
.brand .cos{font-size:15px;color:var(--orange);opacity:.9;}
.brand .rc{font-size:26px;color:var(--navy);}
.hero{text-align:center;padding:56px 0 30px;}
.hero .sub{font-size:15px;color:var(--ink-soft);margin-top:10px;}
.hero .pts{margin-top:30px;display:grid;gap:10px;text-align:left;}
.pt{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;display:flex;gap:12px;align-items:center;}
.pt .e{font-size:24px;}
.pt .t{font-size:14.5px;font-weight:700;}
.pt .d{font-size:13px;color:var(--ink-soft);}
.demo{background:#FFF7E6;border:1px solid #FFE0A3;color:#8A5A00;border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:700;margin-bottom:16px;}
.offer-pick{position:relative;border:1.5px solid var(--line);background:var(--white);border-radius:12px;
  padding:15px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;}
.offer-pick:hover{border-color:var(--orange);background:var(--orange-soft);}
.offer-pick .ico{font-size:18px;flex:none;}
.offer-pick .tt{flex:1;font-size:15px;font-weight:700;color:var(--ink);}
.offer-pick .arw{flex:none;font-size:20px;color:#C4CBD6;}
.offer-pick:hover .arw{color:var(--orange);}
.offer-pick .tip{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);
  background:rgba(20,28,42,.94);color:#fff;font-size:12.5px;font-weight:700;white-space:nowrap;
  padding:8px 12px;border-radius:9px;opacity:0;pointer-events:none;transition:.15s;z-index:10;}
.offer-pick:hover .tip{opacity:1;}
@media (hover:none){ .offer-pick .tip{display:none;} }
.addr-row{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:#fff;
  border-radius:12px;padding:13px;cursor:pointer;transition:.15s;}
.addr-row:hover{border-color:var(--navy);}
.addr-row .dot{flex:none;width:10px;height:10px;border-radius:50%;}
.addr-row .tx{flex:1;font-size:14.5px;color:var(--ink);}
.addr-row .tx.ph{color:#9AA4B4;}
.addr-row .arw{flex:none;color:#C4CBD6;font-size:18px;}
.veh{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px 10px;text-align:center;cursor:pointer;transition:.15s;}
.veh.on{border-color:var(--orange);background:var(--orange-soft);}
.veh.off{opacity:.4;cursor:not-allowed;}
.veh .e{font-size:24px;display:block;}
.veh .n{font-size:13.5px;font-weight:800;margin-top:3px;}
.veh .p{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.veh.on .p{color:var(--orange);font-weight:800;}
.fare-box{background:var(--navy);color:#fff;border-radius:16px;padding:18px;margin-top:16px;}
.fare-box .big{font-size:30px;font-weight:900;letter-spacing:-.02em;}
.sr{border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;background:#fff;}
.sr:hover{border-color:var(--navy);background:var(--navy-soft);}
.sr .n{font-size:14.5px;font-weight:800;}
.sr .a{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
.note{background:#F2F4F7;border-radius:10px;padding:11px;font-size:12px;color:var(--ink-soft);line-height:1.6;}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(20,28,42,.94);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:200;display:none;max-width:88%;text-align:center;}
</style>

<script>
/* ═══════════════════════════════════════════════════
   ROADJOB 퀵 — 고객(보내는 사람) 앱
   1단계: 자전거 · 오토바이 · 승용차
   결제: 기사와 직접 (PG는 추후)
   ═══════════════════════════════════════════════════ */

/* ── 요금표 (여기만 고치면 됩니다) ──
   base   기본요금
   baseKm 기본요금에 포함된 거리
   perKm  초과 1km당
   maxKm  이 차종으로 갈 수 있는 최대 거리
   on     false 로 두면 앱에 안 보입니다 (허가 나오면 true) */
var FARE = {
  '자전거':  { e:'🚲', base:5000,  baseKm:3, perKm:800,  maxKm:7,   on:true,  desc:'서류·소형 봉투' },
  '오토바이':{ e:'🛵', base:7000,  baseKm:5, perKm:900,  maxKm:40,  on:true,  desc:'서류·소형 박스' },
  '승용차':  { e:'🚗', base:8000,  baseKm:5, perKm:1000, maxKm:80,  on:true,  desc:'중소형 박스' },
  '다마스':  { e:'🚐', base:12000, baseKm:5, perKm:1300, maxKm:150, on:false, desc:'소형 화물' },
  '라보':    { e:'🛻', base:15000, baseKm:5, perKm:1500, maxKm:150, on:false, desc:'소형 화물(중)' }
};
var NIGHT_RATE = 1.2;   // 22~06시
var WEEKEND_RATE = 1.1; // 토·일

function calcFare(veh, km, when){
  var f = FARE[veh]; if(!f) return 0;
  var fare = f.base;
  if(km > f.baseKm) fare += Math.ceil(km - f.baseKm) * f.perKm;
  var d = when || new Date();
  var h = d.getHours(), w = d.getDay();
  if(h >= 22 || h < 6) fare *= NIGHT_RATE;
  if(w === 0 || w === 6) fare *= WEEKEND_RATE;
  return Math.round(fare / 100) * 100;
}
function surchargeText(when){
  var d = when || new Date();
  var h = d.getHours(), w = d.getDay();
  var t = [];
  if(h >= 22 || h < 6) t.push('심야 +20%');
  if(w === 0 || w === 6) t.push('주말 +10%');
  return t.join(' · ');
}

var STEPS = ['intro','phone','code','agree','form','done'];
var step = 0, busy = false, confirmResult = null, recaptcha = null;

var O = JSON.parse(localStorage.getItem('rc_order') || 'null') || {
  phone:'', name:'',
  from:null, to:null,          // {name, addr, lat, lon, detail}
  vehicle:'', item:'', note:'',
  agree1:false, agree2:false, agreeGeo:false   // 위치정보는 선택 동의
};
if(O.agreeGeo===undefined) O.agreeGeo=false;
var distKm = 0, timeMin = 0, fare = 0, calcing = false;
var myOrders = [];
var mode = 'signup';          // signup | main
var mainTab = 'new';          // new | list

function save(){ try{ localStorage.setItem('rc_order', JSON.stringify(O)); }catch(e){} }
function live(){ return window._live === true; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"'`]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'}[c];}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block';
  clearTimeout(window._tt); window._tt=setTimeout(function(){t.style.display='none';},2800); }
function fmtPhone(p){ if(!p) return ''; return String(p).replace(/(\d{3})(\d{3,4})(\d{4})/,'$1-$2-$3'); }
function won(n){ return Number(n||0).toLocaleString()+'원'; }
function row(k,v){ return '<div class="row"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }

function clearLocal(){
  try{
    localStorage.removeItem('rc_role');
    localStorage.removeItem('rc_driver');
    localStorage.removeItem('rc_company');
    localStorage.removeItem('rc_order');
    localStorage.removeItem('rc_home');
  }catch(e){}
}
function goHome(){ try{ localStorage.setItem('rc_home','1'); }catch(e){} location.replace('index.html'); }
function logout(){
  stopRealtime();
  clearLocal();
  O = { phone:'', name:'', from:null, to:null, vehicle:'', item:'', note:'', agree1:false, agree2:false };
  if(live()){ window._fb.signOut(window._auth).catch(function(){}).then(function(){ location.replace('index.html'); }); }
  else location.replace('index.html');
}

function go(i){ step=i; render(); window.scrollTo(0,0); }
function next(){ if(step<STEPS.length-1) go(step+1); }
function prev(){ if(step>0) go(step-1); }

/* ── 화면 ── */
var T = { phone:'휴대폰 인증', code:'인증번호', agree:'약관 동의', form:'배송 주문', done:'주문 완료' };

function render(){
  if(mode==='main'){ renderMain(); return; }
  var s = STEPS[step];
  var top = document.getElementById('topbar');
  if(s==='intro'){
    top.innerHTML = '';
  } else if(s==='form' && myOrders.length){
    /* 이미 주문한 적 있는 고객 — 뒤로가기 대신 '내 주문'으로 */
    top.innerHTML = '<div class="top">'
      +'<button class="back" onclick="mode=\'main\';mainTab=\'list\';renderMain()" title="내 주문">‹</button>'
      +'<h1>'+(T[s]||'')+'</h1>'
      +'<button class="back" style="font-size:19px;" onclick="goHome()" title="처음 화면으로">🏠</button></div>';
  } else {
    top.innerHTML = '<div class="top"><button class="back" onclick="prev()">‹</button><h1>'+(T[s]||'')+'</h1>'
      +'<button class="back" style="font-size:19px;" onclick="goHome()" title="처음 화면으로">🏠</button></div>';
  }
  document.getElementById('progbar').style.width = (step/(STEPS.length-1)*100)+'%';
  document.getElementById('view').innerHTML = V[s]();
  document.getElementById('foot').innerHTML = F[s]();
  if(s==='form') setTimeout(recalc, 30);
}

function demoBar(){ return live() ? '' : '<div class="demo">⚠️ 시안 모드 — 웹(https)에서만 주문됩니다.</div>'; }

var V = {
intro:function(){ return ''
  +'<div class="hero" style="padding:44px 0 22px;">'
  +'<div class="brand"><span class="cos">cos</span><span class="rc">ROADJOB</span></div>'
  +'<p class="sub" style="font-weight:800;color:var(--orange);">퀵 · 소형화물 배송</p>'
  +'<p class="sub">서류 한 장부터 소형 박스까지<br>가까운 기사님이 바로 갑니다.</p>'
  +'<div class="pts">'
  +'<div class="pt"><span class="e">💰</span><div><div class="t">요금을 미리 봅니다</div><div class="d">거리로 자동 계산 · 주문 전에 금액 확인</div></div></div>'
  +'<div class="pt"><span class="e">⚡</span><div><div class="t">기사님이 바로 수락</div><div class="d">수락되면 기사 연락처를 문자로 받습니다</div></div></div>'
  +'<div class="pt"><span class="e">✅</span><div><div class="t">면허 인증된 기사</div><div class="d">면허를 확인한 기사만 배송합니다</div></div></div>'
  +'</div>'
  +'<div style="margin-top:22px;"><a href="javascript:goHome()" style="font-size:13.5px;color:var(--ink-soft);">← 기사·업체이신가요? 처음 화면으로</a></div>'
  +'</div>'; },

phone:function(){ return demoBar()
  +'<h2 class="step-title">휴대폰 번호를<br>입력해 주세요</h2>'
  +'<p class="step-desc">기사님이 이 번호로 연락드립니다.</p>'
  +'<div class="field"><label class="lb">휴대폰 번호 <span class="req">*</span></label>'
  +'<input type="tel" id="f-phone" inputmode="numeric" maxlength="11" autocomplete="tel" placeholder="01012345678" value="'+esc(O.phone)+'" oninput="O.phone=this.value.replace(/[^0-9]/g,\'\');this.value=O.phone;chk()">'
  +'<div class="hint">숫자만 입력하세요 (- 없이)</div></div>'; },

code:function(){ return demoBar()
  +'<h2 class="step-title">인증번호를<br>입력해 주세요</h2>'

/* ── 거리 · 차종 · 요금 ── */
function distBox(){
  if(!O.from || !O.to) return '';
  if(calcing) return '<div class="note" style="margin-bottom:20px;text-align:center;">거리를 계산하는 중입니다...</div>';
  if(!distKm) return '<div class="note" style="margin-bottom:20px;text-align:center;color:#F04438;">거리를 계산하지 못했습니다. <button class="viewmore" onclick="recalc()">다시 시도</button></div>';
  return '<div class="note" style="margin-bottom:20px;text-align:center;">'
    +'📍 <b>'+distKm.toFixed(1)+'km</b> · 예상 '+timeMin+'분'
    +(surchargeText()?' · <span style="color:var(--orange);font-weight:800;">'+surchargeText()+'</span>':'')
    +'</div>';
}
function vehBox(){
  if(!distKm) return '';
  var h = '<div class="field"><label class="lb">차량 <span class="req">*</span></label><div class="opts col2" style="grid-template-columns:repeat(3,1fr);">';
  for(var k in FARE){
    var f = FARE[k];
    if(!f.on) continue;
    var over = distKm > f.maxKm;
    var p = over ? (f.maxKm+'km 이내') : won(calcFare(k, distKm));
    h += '<div class="veh '+(O.vehicle===k?'on':'')+(over?' off':'')+'" '
      + (over?'onclick="toast(\''+k+'는 '+f.maxKm+'km 이내만 가능합니다.\')"' : 'onclick="pickVeh(\''+k+'\')"')+'>'
      + '<span class="e">'+f.e+'</span>'
      + '<div class="n">'+k+'</div>'
      + '<div class="p">'+p+'</div>'
      + '</div>';
  }
  h += '</div><div class="hint">'+vehDesc()+'</div></div>';
  return h;
}
function vehDesc(){
  var f = FARE[O.vehicle];
  return f ? f.desc + ' · ' + f.maxKm + 'km 이내' : '보낼 물건에 맞는 차량을 골라주세요.';
}
function pickVeh(k){
  var f = FARE[k];
  if(!f || !f.on) return;
  if(distKm > f.maxKm){ toast(k+'는 '+f.maxKm+'km 이내만 가능합니다.'); return; }
  O.vehicle = k; save(); fare = calcFare(k, distKm); render();
}
function fareBox(){
  if(!O.vehicle || !distKm) return '';
  var f = FARE[O.vehicle];
  var base = f.base;
  var extra = distKm > f.baseKm ? Math.ceil(distKm - f.baseKm) * f.perKm : 0;
  var sur = surchargeText();
  return '<div class="fare-box">'
    +'<div style="font-size:13px;opacity:.75;">예상 요금</div>'
    +'<div class="big">'+won(fare)+'</div>'
    +'<div style="font-size:12.5px;opacity:.7;margin-top:8px;line-height:1.7;">'
    +'기본 '+won(base)+' (' + f.baseKm + 'km 포함)'
    +(extra?'<br>추가 '+Math.ceil(distKm-f.baseKm)+'km × '+won(f.perKm)+' = '+won(extra):'')
    +(sur?'<br>'+sur:'')
    +'</div></div>';
}

function recalc(){
  fare = 0;
  if(!O.from || !O.to){ distKm=0; return; }
  if(calcing) return;
  calcing = true;
  var view = document.getElementById('view');
  if(view) render();
  fetch('https://cosroad.vercel.app/api/rc-quick', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'route', sx:O.from.lon, sy:O.from.lat, ex:O.to.lon, ey:O.to.lat })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    calcing = false;
    if(j && j.ok){
      distKm = j.distanceM / 1000;
      timeMin = Math.max(1, Math.round(j.timeSec / 60));
      /* 고른 차종이 거리 상한을 넘으면 해제 */
      if(O.vehicle && (!FARE[O.vehicle] || distKm > FARE[O.vehicle].maxKm)) O.vehicle='';
      if(O.vehicle) fare = calcFare(O.vehicle, distKm);
      save();
    } else {
      distKm = 0;
      toast((j && j.message) || '거리를 계산하지 못했습니다.');
    }
    render();
  })
  .catch(function(){
    calcing = false; distKm = 0;
    toast('거리 계산에 실패했습니다. 잠시 후 다시 시도해 주세요.');
    render();
  });
}

/* ── 내 위치 (위치정보법: 동의 없이는 절대 호출하지 않는다) ── */
var geoBusy = false;
function askGeo(){
  if(!confirm('「내 위치」를 쓰려면 위치정보 이용에 동의해야 합니다.\n\n· 출발지 주소를 채우는 용도로만 사용합니다\n· 위치는 저장하지 않습니다\n· 언제든 철회할 수 있습니다\n\n동의하시겠습니까?')) return;
  O.agreeGeo = true; save(); render();
  toast('✅ 동의했습니다. 「내 위치」를 쓸 수 있습니다.');
}
function useMyLocation(){
  if(!O.agreeGeo){ askGeo(); return; }
  if(geoBusy) return;
  if(!navigator.geolocation){ toast('이 브라우저는 위치를 지원하지 않습니다.'); return; }

  geoBusy = true;
  toast('위치를 확인하는 중입니다...');
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    fetch('https://cosroad.vercel.app/api/rc-quick', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'reverse', lat:lat, lon:lon })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      geoBusy = false;
      if(!j || !j.ok){ toast((j&&j.message)||'주소를 찾지 못했습니다. 직접 검색해 주세요.'); return; }
      var keep = (O.from && O.from.detail) || '';
      O.from = { name:j.name, addr:j.addr, lat:j.lat, lon:j.lon, detail:keep };
      save(); recalc();
      toast('📍 내 위치로 설정했습니다.');
    })
    .catch(function(){ geoBusy=false; toast('주소 변환에 실패했습니다. 직접 검색해 주세요.'); });
  }, function(err){
    geoBusy = false;
    if(err.code === 1) toast('위치 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.');
    else toast('위치를 가져오지 못했습니다. 직접 검색해 주세요.');
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:0 });
}

var searchTarget = null, searchTimer = null;
function openSearch(which){
  searchTarget = which;
  document.getElementById('mTitle').textContent = (which==='from'?'출발지':'도착지')+' 검색';
  document.getElementById('mBody').innerHTML =
     '<input type="text" id="sq" placeholder="건물명·도로명·지번 (예: 인천 연수구청)" oninput="doSearch(this.value)">'
    +'<div class="hint">두 글자 이상 입력하면 자동으로 찾습니다.</div>'
    +'<div id="sres" style="margin-top:14px;"></div>';
  document.getElementById('modal').classList.add('on');
  setTimeout(function(){ var e=document.getElementById('sq'); if(e) e.focus(); }, 60);
}
function doSearch(q){
  clearTimeout(searchTimer);
  var res = document.getElementById('sres');
  if(!q || q.trim().length < 2){ if(res) res.innerHTML=''; return; }
  searchTimer = setTimeout(function(){
    if(res) res.innerHTML = '<div class="hint">찾는 중...</div>';
    fetch('https://cosroad.vercel.app/api/rc-quick', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'search', keyword:q })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      var el = document.getElementById('sres'); if(!el) return;
      if(!j || !j.ok || !j.list.length){ el.innerHTML = '<div class="hint">결과가 없습니다. 다른 이름으로 검색해 보세요.</div>'; return; }
      window._sres = j.list;
      el.innerHTML = j.list.map(function(p,i){
        return '<div class="sr" onclick="pickAddr('+i+')"><div class="n">'+esc(p.name)+'</div><div class="a">'+esc(p.addr)+'</div></div>';
      }).join('');
    })
    .catch(function(){ var el=document.getElementById('sres'); if(el) el.innerHTML='<div class="hint">검색에 실패했습니다.</div>'; });
  }, 350);
}
function pickAddr(i){
  var p = (window._sres||[])[i]; if(!p || !searchTarget) return;
  var keep = (O[searchTarget] && O[searchTarget].detail) || '';
  O[searchTarget] = { name:p.name, addr:p.addr, lat:p.lat, lon:p.lon, detail:keep };
  save(); closeModal(); recalc();
}
function closeModal(){ document.getElementById('modal').classList.remove('on'); }

function valid(){
  var s = STEPS[step];
  if(s==='phone') return /^01[0-9]{8,9}$/.test(O.phone);
  if(s==='code'){ var e=document.getElementById('f-code'); return !!e && e.value.replace(/[^0-9]/g,'').length===6; }
  if(s==='agree') return O.agree1 && O.agree2;
  if(s==='form') return !!(O.name.trim() && O.from && O.to && O.vehicle && O.item.trim() && distKm && fare);
  return true;
}
function chk(){ var b=document.getElementById('nx'); if(b) b.disabled=!valid()||busy; save(); }
function setBusy(v,label){ busy=v; var b=document.getElementById('nx'); if(b){ b.disabled=v||!valid(); if(label) b.textContent=label; } }

/* ── 인증 ── */
function makeRecaptcha(){
  try{ if(recaptcha) recaptcha.clear(); }catch(e){}
  recaptcha = null;
  var host = document.getElementById('recaptcha');
  if(host && host.parentNode){
    var fresh = document.createElement('div');
    fresh.id = 'recaptcha';
    host.parentNode.replaceChild(fresh, host);
  }
  recaptcha = new window._fb.RecaptchaVerifier(window._auth, 'recaptcha', { size:'invisible' });
  return recaptcha;
}
function sendCode(){
  if(!valid()||busy) return;
  if(!live()){ next(); return; }
  setBusy(true,'발송 중...');
  try{
    var v = makeRecaptcha();
    window._fb.signInWithPhoneNumber(window._auth, '+82'+O.phone.replace(/^0/,''), v)
      .then(function(res){ confirmResult=res; setBusy(false,'인증번호 받기'); next(); })
      .catch(function(e){
        setBusy(false,'인증번호 받기');
        toast('발송 실패: '+(e.code||e.message));
        try{ v.clear(); }catch(_){} recaptcha=null;
      });
  }catch(e){ setBusy(false,'인증번호 받기'); toast('오류: '+e.message); recaptcha=null; }
}
function verifyCode(){
  if(!valid()||busy) return;
  if(!live()){ next(); return; }
  if(!confirmResult){ toast('인증 정보가 없습니다. 처음부터 다시 시도해 주세요.'); go(1); return; }
  var code = document.getElementById('f-code').value;
  setBusy(true,'확인 중...');
  confirmResult.confirm(code)
    .then(function(){ setBusy(false,'확인'); next(); })
    .catch(function(){ setBusy(false,'확인'); toast('인증번호가 올바르지 않습니다.'); });
}

/* ── 주문 ── */
function submitOrder(){
  if(!valid()||busy) return;
  if(!live()){ toast('시안 모드에서는 주문할 수 없습니다.'); return; }
  var u = window._auth.currentUser;
  if(!u){ toast('인증 정보가 없습니다. 처음부터 다시 시도해 주세요.'); return; }
  setBusy(true,'주문 중...');
  var fb = window._fb;
  fb.addDoc(fb.collection(window._db,'orders'), {
    customerId: u.uid,
    customerName: O.name,
    customerPhone: O.phone,
    fromName: O.from.name, fromAddr: O.from.addr, fromDetail: O.from.detail||'',
    fromLat: O.from.lat, fromLon: O.from.lon,
    toName: O.to.name, toAddr: O.to.addr, toDetail: O.to.detail||'',
    toLat: O.to.lat, toLon: O.to.lon,
    vehicle: O.vehicle, item: O.item, note: O.note||'',
    distanceKm: Math.round(distKm*10)/10,
    fare: fare,
    payType: '기사와 직접',
    status: 'open',
    agreePrivacy: O.agree1, agreeTerms: O.agree2, agreeGeo: !!O.agreeGeo, agreedAt: fb.serverTimestamp(),
    createdAt: fb.serverTimestamp()
  })
  .then(function(){
    setBusy(false);
    /* 다음 주문을 위해 배송 정보만 비운다 (이름·번호는 유지) */
    next();
    O.from=null; O.to=null; O.vehicle=''; O.item=''; O.note='';
    distKm=0; fare=0; save();
    return loadMyOrders();
  })
  .catch(function(e){ setBusy(false,'주문하기'); toast('주문 실패: '+(e.code||e.message)); });
}

/* ── 내 주문 ── */
function loadMyOrders(){
  var u = window._auth.currentUser; if(!u) return Promise.resolve();
  var fb = window._fb;
  return fb.getDocs(fb.query(fb.collection(window._db,'orders'), fb.where('customerId','==',u.uid)))
    .then(function(snap){
      myOrders=[]; snap.forEach(function(d){ var o=d.data(); o.id=d.id; myOrders.push(o); });
      myOrders.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
    })
    .catch(function(){ myOrders=[]; });
}

var OST = {
  open:['기사 찾는 중','#EA580C','#FFF4ED'],
  accepted:['기사 배정됨','#1570EF','#EFF8FF'],
  picked:['배송 중','#7C3AED','#F4EBFF'],
  done:['배송 완료','#12B76A','#ECFDF3'],
  canceled:['취소됨','#98A2B3','#F2F4F7']
};

function enterMain(){ mode='main'; mainTab='list'; loadMyOrders().then(renderMain).then(startRealtime); }

function renderMain(){
  document.getElementById('topbar').innerHTML =
    '<div class="top"><h1>'+(mainTab==='new'?'배송 주문':'내 주문')+'</h1></div>';
  document.getElementById('progbar').style.width='0';

  if(mainTab==='new'){
    mode='signup'; step=4; render(); return;
  }

  var body;
  if(!myOrders.length){
    body = '<div style="text-align:center;padding:60px 20px;color:var(--ink-soft);">'
      +'<div style="font-size:46px;">📦</div>'
      +'<p style="font-size:15px;margin:14px 0 6px;font-weight:700;color:var(--ink);">주문 내역이 없습니다</p>'
      +'<p style="font-size:13.5px;">배송할 물건이 있으면 주문해 보세요.</p></div>';
  } else {
    body = myOrders.map(function(o,i){
      var s = OST[o.status]||OST.open;
      return '<div class="card" style="margin-top:0;margin-bottom:12px;">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
        +'<div style="font-size:15.5px;font-weight:800;line-height:1.5;">'+esc(o.fromName)+' → '+esc(o.toName)+'</div>'
        +'<span style="flex:none;font-size:12px;font-weight:800;padding:5px 11px;border-radius:20px;color:'+s[1]+';background:'+s[2]+';">'+s[0]+'</span></div>'
        +'<div style="font-size:13px;color:var(--ink-soft);margin-top:6px;">'
        + (FARE[o.vehicle]?FARE[o.vehicle].e+' ':'') + esc(o.vehicle) + ' · ' + esc(o.item)
        + ' · <b style="color:var(--orange);">'+won(o.fare)+'</b></div>'
        + (o.driverName
            ? '<div style="background:var(--navy-soft);border-radius:10px;padding:11px;margin-top:10px;font-size:13px;color:var(--navy);">'
              +'🚚 <b>'+esc(o.driverName)+'</b> 기사님 · '+fmtPhone(o.driverPhone)
              +'<a class="btn btn-main" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box;margin-top:9px;padding:11px;font-size:14px;" href="tel:'+esc(o.driverPhone)+'">📞 전화하기</a>'
              +'</div>'
            : '')
        + (o.status==='open'
            ? '<button class="btn btn-ghost" style="margin-top:10px;padding:11px;font-size:14px;color:#F04438;border-color:#FECDCA;" onclick="cancelOrder('+i+')">주문 취소</button>'
            : '')
        +'</div>';
    }).join('');
  }

  body += geoToggle();
  document.getElementById('view').innerHTML = body;
  document.getElementById('foot').innerHTML =
    '<div style="display:flex;">'
    +'<div onclick="mainTab=\'new\';renderMain()" style="flex:1;text-align:center;padding:4px 0;cursor:pointer;color:#9AA4B4;font-weight:600;">'
    +'<div style="font-size:21px;">📦</div><div style="font-size:11.5px;margin-top:2px;">주문하기</div></div>'
    +'<div onclick="mainTab=\'list\';renderMain()" style="flex:1;text-align:center;padding:4px 0;cursor:pointer;color:var(--navy);font-weight:800;">'
    +'<div style="font-size:21px;">📋</div><div style="font-size:11.5px;margin-top:2px;">내 주문</div></div>'
    +'<div onclick="goHome()" style="flex:1;text-align:center;padding:4px 0;cursor:pointer;color:#9AA4B4;font-weight:600;">'
    +'<div style="font-size:21px;">🏠</div><div style="font-size:11.5px;margin-top:2px;">홈</div></div>'
    +'<div onclick="logout()" style="flex:1;text-align:center;padding:4px 0;cursor:pointer;color:#9AA4B4;font-weight:600;">'
    +'<div style="font-size:21px;">👤</div><div style="font-size:11.5px;margin-top:2px;">로그아웃</div></div>'
    +'</div>';
}

/* 위치정보 동의는 언제든 켜고 끌 수 있어야 한다 (철회권) */
function geoToggle(){
  var on = O.agreeGeo === true;
  return '<div class="card" style="margin-top:14px;">'
    +'<div style="display:flex;align-items:center;gap:12px;">'
    +'<div style="flex:1;">'
    +'<div style="font-size:14.5px;font-weight:800;">📍 위치정보 이용 <span class="tag-opt">[선택]</span></div>'
    +'<div style="font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.5;">'
    +(on ? '「내 위치」 버튼으로 출발지를 자동으로 채웁니다.<br>위치는 <b>저장하지 않습니다.</b>'
         : '지금은 <b>사용하지 않음</b>. 주소를 직접 검색합니다.')
    +'</div></div>'
    +'<div onclick="togGeo()" style="flex:none;width:52px;height:30px;border-radius:20px;cursor:pointer;transition:.2s;'
    +'background:'+(on?'#12B76A':'#C4CBD6')+';position:relative;">'
    +'<div style="position:absolute;top:3px;left:'+(on?'25px':'3px')+';width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;"></div>'
    +'</div></div></div>';
}
function togGeo(){
  O.agreeGeo = !O.agreeGeo; save(); renderMain();
  toast(O.agreeGeo ? '✅ 위치정보 이용에 동의했습니다.' : '위치정보 이용을 껐습니다.');
}

function cancelOrder(i){
  var o = myOrders[i]; if(!o) return;
  if(o.status!=='open'){ toast('이미 기사님이 배정되었습니다. 기사님과 협의해 주세요.'); return; }
  if(!confirm('이 주문을 취소할까요?\n\n' + o.fromName + ' → ' + o.toName)) return;
  var fb = window._fb;
  fb.updateDoc(fb.doc(window._db,'orders',o.id), { status:'canceled', canceledAt:new Date().toISOString() })
    .then(function(){ toast('주문을 취소했습니다.'); return loadMyOrders(); })
    .then(renderMain)
    .catch(function(e){ toast('취소 실패: '+(e.code||e.message)); });
}

/* ═══ 실시간: 기사가 수락하면 즉시 화면이 바뀐다 ═══ */
var unsubOrders = null;
var lastStatus = {};

function stopRealtime(){ try{ if(unsubOrders) unsubOrders(); }catch(e){} unsubOrders=null; }
function startRealtime(){
  var u = window._auth && window._auth.currentUser;
  if(!u || !live()) return;
  var fb = window._fb;
  stopRealtime();
  unsubOrders = fb.onSnapshot(
    fb.query(fb.collection(window._db,'orders'), fb.where('customerId','==',u.uid)),
    function(snap){
      myOrders = [];
      var changed = null;
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id; myOrders.push(o);
        if(lastStatus[o.id] && lastStatus[o.id] !== o.status) changed = o;
        lastStatus[o.id] = o.status;
      });
      myOrders.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });

      if(changed){
        var msg = { accepted:'🚚 기사님이 배정되었습니다!', picked:'📦 물품을 픽업했습니다.',
                    done:'✅ 배송이 완료되었습니다.', canceled:'주문이 취소되었습니다.' }[changed.status];
        if(msg){
          toast(msg);
          try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){}
        }
      }
      if(mode==='main') renderMain();
    },
    function(e){ console.warn('주문 구독 실패', e); }
  );
}

/* ── 부팅 ── */
function boot(){
  if(window._booted) return;
  window._booted = true;
  if(!live()){ render(); return; }
  window._fb.onAuthStateChanged(window._auth, function(u){
    if(!u){ mode='signup'; render(); return; }
    try{ localStorage.setItem('rc_role','order'); }catch(e){}
    loadMyOrders().then(function(){
      if(myOrders.length){ enterMain(); }
      else { mode='signup'; step=4; render(); }   // 인증은 됐으니 주문 폼부터
    });
  });
}
window.addEventListener('fbready', boot);
setTimeout(function(){ if(!window._booted){ window._booted=true; boot(); } }, 1400);
</script>
