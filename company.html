<style>
:root{--navy:#0F2A47;--navy-soft:#E8EEF5;--orange:#EA580C;--orange-soft:#FFF4ED;
--ink:#1A2233;--ink-soft:#5A6478;--line:#E4E8EF;--bg:#F6F8FB;--white:#fff;--ok:#12B76A;--err:#F04438;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.top{position:sticky;top:0;z-index:20;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:14px 16px;}
.back{border:none;background:none;font-size:22px;color:var(--ink-soft);cursor:pointer;padding:0 4px;}
.top h1{font-size:16px;font-weight:800;margin:0;flex:1;}
.hbrand{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hbrand .bn{flex:none;font-size:16px;font-weight:800;letter-spacing:-.2px;color:var(--ink);line-height:1.1;}
.hbrand .bn .hcos{font-size:10px;font-weight:800;color:var(--orange);vertical-align:2px;}
.hbrand .tx{min-width:0;text-align:right;}
.hbrand .bt{font-size:11px;font-weight:700;color:var(--ink-soft);line-height:1.3;}
.hbrand .bt2{font-size:10px;font-weight:600;color:#9AA4B4;line-height:1.3;}
.prog{height:4px;background:var(--line);}
.prog i{display:block;height:100%;background:var(--orange);width:0;transition:.3s;}
.wrap{flex:1;padding:22px 18px 120px;}
.step-title{font-size:24px;font-weight:850;letter-spacing:-.02em;margin:0 0 8px;}
.step-desc{font-size:15px;color:var(--ink-soft);margin:0 0 24px;}
.field{margin-bottom:20px;}
label.lb{display:block;font-size:14px;font-weight:700;margin-bottom:8px;}
.req{color:var(--orange);}
input[type=text],input[type=tel],select,textarea{width:100%;padding:15px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:var(--white);color:var(--ink);font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);}
textarea{min-height:90px;resize:vertical;}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:6px;}
.opts{display:grid;gap:8px;}
.opts.col2{grid-template-columns:1fr 1fr;}
.opt{border:1.5px solid var(--line);background:var(--white);border-radius:12px;padding:14px 12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;}
.opt.on{border-color:var(--navy);background:var(--navy);color:#fff;}
.opt .ico{display:block;font-size:22px;margin-bottom:4px;}
.foot{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--white);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom));}
.btn{width:100%;padding:17px;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-main{background:var(--navy);color:#fff;}
.btn-main:disabled{background:#C4CBD6;cursor:not-allowed;}
.btn-ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--navy);}
.agree-all{border:1.5px solid var(--navy);background:var(--navy-soft);border-radius:12px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;font-weight:800;font-size:16px;}
.agree{display:flex;align-items:flex-start;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.agree:last-child{border-bottom:none;}
.chk{flex:none;width:24px;height:24px;border:2px solid #C4CBD6;border-radius:50%;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;font-weight:900;transition:.15s;}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff;}
.agree .tx{flex:1;font-size:14.5px;}
.tag-req{font-size:11px;color:var(--orange);font-weight:800;}
.tag-opt{font-size:11px;color:var(--ink-soft);font-weight:800;}
.viewmore{font-size:12.5px;color:var(--ink-soft);text-decoration:underline;background:none;border:none;cursor:pointer;padding:4px 0 0;}
.upload{display:block;border:2px dashed #C4CBD6;border-radius:14px;padding:28px 16px;text-align:center;background:var(--white);cursor:pointer;}
.upload .big{font-size:34px;}
.upload p{margin:8px 0 0;font-size:14px;color:var(--ink-soft);}
.preview{position:relative;border-radius:14px;overflow:hidden;border:1.5px solid var(--line);}
.preview img{width:100%;display:block;}
.preview .del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;}
.done{text-align:center;padding:40px 0 10px;}
.done .mark{width:76px;height:76px;border-radius:50%;background:var(--ok);color:#fff;font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px;text-align:left;}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--ink-soft);}
.row .v{font-weight:700;text-align:right;}
.badge{display:inline-block;background:var(--orange-soft);color:var(--orange);font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;margin-left:6px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;}
.modal.on{display:flex;}
.sheet{background:#fff;width:100%;max-width:520px;margin:0 auto;border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto;}
.sheet h3{margin:0 0 14px;font-size:18px;font-weight:850;}
.sheet .body{font-size:14px;color:var(--ink-soft);line-height:1.8;}
.sheet .body b{color:var(--ink);}
/* 퀵 = 움직이는 일. 차가 좌우로 다니게 */
.qk{display:inline-block;animation:qk-run 1.6s ease-in-out infinite;}
.ri{height:26px;width:auto;display:block;margin:0 auto;}
/* 퀵 트럭은 좌우로 달리므로 조금 작게 — 옆 칸 침범 방지 */
.qk .ri{height:23px;}
@keyframes qk-run{0%,100%{transform:translateX(-9px);}50%{transform:translateX(9px);}}
@media (prefers-reduced-motion:reduce){.qk{animation:none;}}
.brand{display:flex;align-items:center;justify-content:center;gap:2px;font-weight:900;letter-spacing:-.02em;}
.brand .cos{font-size:15px;color:var(--orange);opacity:.9;}
.brand .rc{font-size:26px;color:var(--navy);}
.hero{text-align:center;padding:56px 0 30px;}
.hero .sub{font-size:15px;color:var(--ink-soft);margin-top:10px;}
.hero .pts{margin-top:30px;display:grid;gap:10px;text-align:left;}
.pt{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;display:flex;gap:12px;align-items:center;}
.pt .e{font-size:24px;}
.pt .t{font-size:14.5px;font-weight:700;}
.pt .d{font-size:13px;color:var(--ink-soft);}
.demo{background:#FFF7E6;border:1px solid #FFE0A3;color:#8A5A00;border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:700;margin-bottom:16px;}
.offer-pick{position:relative;border:1.5px solid var(--line);background:var(--white);border-radius:12px;
  padding:15px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;}
.offer-pick:hover{border-color:var(--orange);background:var(--orange-soft);}
.offer-pick .ico{font-size:18px;flex:none;}
.offer-pick .tt{flex:1;font-size:15px;font-weight:700;color:var(--ink);}
.offer-pick .arw{flex:none;font-size:20px;color:#C4CBD6;}
.offer-pick:hover .arw{color:var(--orange);}
.offer-pick .tip{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);
  background:rgba(20,28,42,.94);color:#fff;font-size:12.5px;font-weight:700;white-space:nowrap;
  padding:8px 12px;border-radius:9px;opacity:0;pointer-events:none;transition:.15s;z-index:10;}
.offer-pick:hover .tip{opacity:1;}
@media (hover:none){ .offer-pick .tip{display:none;} }
.addr-row{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:#fff;
  border-radius:12px;padding:13px;cursor:pointer;transition:.15s;}
.addr-row:hover{border-color:var(--navy);}
.addr-row .dot{flex:none;width:10px;height:10px;border-radius:50%;}
.addr-row .tx{flex:1;font-size:14.5px;color:var(--ink);}
.addr-row .tx.ph{color:#9AA4B4;}
.addr-row .arw{flex:none;color:#C4CBD6;font-size:18px;}
.veh{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px 10px;text-align:center;cursor:pointer;transition:.15s;}
.veh.on{border-color:var(--orange);background:var(--orange-soft);}
.veh.off{opacity:.4;cursor:not-allowed;}
.veh .e{font-size:24px;display:block;}
.veh .n{font-size:13.5px;font-weight:800;margin-top:3px;}
.veh .p{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.veh.on .p{color:var(--orange);font-weight:800;}
.fare-box{background:var(--navy);color:#fff;border-radius:16px;padding:18px;margin-top:16px;}
.fare-box .big{font-size:30px;font-weight:900;letter-spacing:-.02em;}
.sr{border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;background:#fff;}
.sr:hover{border-color:var(--navy);background:var(--navy-soft);}
.sr .n{font-size:14.5px;font-weight:800;}
.sr .a{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
.note-mid{background:#F2F4F7;border-radius:10px;padding:12px;margin-top:16px;font-size:12px;color:var(--ink-soft);line-height:1.7;}
.note-mid b{color:var(--ink);}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(20,28,42,.94);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:200;display:none;max-width:88%;text-align:center;}
</style>

function tag(t){ return '<span style="font-size:12.5px;font-weight:700;color:var(--ink-soft);background:#F2F4F7;border-radius:8px;padding:6px 10px;">'+t+'</span>'; }

/* ── 렌더 ── */
function go(i){ step=i; render(); window.scrollTo(0,0); }
function next(){ if(step<STEPS.length-1) go(step+1); }
function prev(){ if(step>0) go(step-1); }
function render(){
  if(mode==='main'){ renderMain(); return; }
  var s = STEPS[step];
  var top = document.getElementById('topbar');
  if(s==='intro'||s==='done'){ top.innerHTML=''; }
  else {
    var T={phone:'휴대폰 인증',code:'인증번호 입력',agree:'약관 동의',c1:'업체 정보'};
    top.innerHTML='<div class="top"><button class="back" onclick="prev()">‹</button><h1>'+T[s]+'</h1>'
      +'<button class="back" style="font-size:19px;" onclick="goHome()" title="처음 화면으로">🏠</button></div>';
  }
  document.getElementById('progbar').style.width=(step/(STEPS.length-1)*100)+'%';
  document.getElementById('view').innerHTML = VIEWS[s]();
  document.getElementById('foot').innerHTML = FOOT[s]();
  if(s==='c1') fillSido();
}

function valid(){
  var s=STEPS[step];
  if(s==='phone') return /^01[0-9]{8,9}$/.test(C.phone);
  if(s==='code'){ var e=document.getElementById('f-code'); return !!e && e.value.length===6; }
  if(s==='agree') return C.agree1;
  if(s==='c1') return C.company.trim() && C.manager.trim() && C.bizType && C.area;
  return true;
}
function chk(){ var b=document.getElementById('nx'); if(b) b.disabled=!valid()||busy; save(); }
function setBusy(v,label){ busy=v; var b=document.getElementById('nx'); if(b){ b.disabled=v||!valid(); if(label) b.textContent=label; } }
function fillSido(){ var s=document.getElementById('f-sido'); if(!s)return;
  s.innerHTML='<option value="">시/도</option>'+Object.keys(SIDO).map(function(k){return '<option>'+k+'</option>';}).join(''); }
function fillGugun(){ var sd=document.getElementById('f-sido').value, g=document.getElementById('f-gugun');
  g.innerHTML='<option value="">시/군/구</option>'+(SIDO[sd]||[]).map(function(k){return '<option>'+k+'</option>';}).join(''); }
function setArea(){
  var sd=document.getElementById('f-sido').value, gg=document.getElementById('f-gugun').value, em=document.getElementById('f-emd').value.trim();
  if(!sd||!gg){ toast('시/도와 시/군/구를 선택해 주세요.'); return; }
  C.area = sd+' '+gg+(em?' '+em:''); save(); render();

/* ── 인증 ── */
function makeRecaptcha(){
  try{ if(recaptcha) recaptcha.clear(); }catch(e){}
  recaptcha=null;
  var host=document.getElementById('recaptcha');
  if(host && host.parentNode){ var f=document.createElement('div'); f.id='recaptcha'; host.parentNode.replaceChild(f,host); }
  recaptcha = new window._fb.RecaptchaVerifier(window._auth,'recaptcha',{size:'invisible'});
  return recaptcha;
}
function sendCode(){
  if(!valid()||busy) return; save();
  if(!live()){ next(); return; }
  setBusy(true,'발송 중...');
  try{
    var v=makeRecaptcha();
    window._fb.signInWithPhoneNumber(window._auth, '+82'+C.phone.replace(/^0/,''), v)
      .then(function(r){ confirmResult=r; setBusy(false,'인증번호 받기'); next(); })
      .catch(function(e){ setBusy(false,'인증번호 받기'); toast('발송 실패: '+(e.code||e.message)); try{v.clear();}catch(_){} recaptcha=null; });
  }catch(e){ setBusy(false,'인증번호 받기'); toast('오류: '+e.message); recaptcha=null; }
}
function verifyCode(){
  if(!valid()||busy) return;
  if(!live()){ next(); return; }
  setBusy(true,'확인 중...');
  confirmResult.confirm(document.getElementById('f-code').value)
    .then(function(){ setBusy(false,'확인'); next(); })
    .catch(function(){ setBusy(false,'확인'); toast('인증번호가 올바르지 않습니다.'); });
}
function finish(){
  save();
  if(!live()){ next(); return; }
  var u=window._auth.currentUser;
  if(!u){ toast('인증 정보가 없습니다. 다시 시도해 주세요.'); return; }
  setBusy(true,'저장 중...');
  var fb=window._fb;
  fb.setDoc(fb.doc(window._db,'companies',u.uid), {
    uid:u.uid, phone:C.phone, company:C.company, manager:C.manager,
    bizType:C.bizType, area:C.area, agreePrivacy:C.agree1, createdAt: fb.serverTimestamp()
  }).then(function(){ setBusy(false); next(); })
    .catch(function(e){ setBusy(false,'가입 완료'); toast('저장 실패: '+(e.code||e.message)); });
}

/* 탭 → 아이콘. 역할에 따라 구직/구인, 퀵수락/퀵발송이 갈린다 */
function icoFor(tab, role){
  if(tab === 'jobs')  return ICO[role === 'company' ? 'jobs_c'  : 'jobs_d'];
  if(tab === 'quick') return '<span class="qk">' + ICO[role === 'company' ? 'quick_c' : 'quick_d'] + '</span>';
  return ICO[tab] || '';
}

function tabbar(){
  var t=[['jobs','📢','기사구인'],['quick','📦','퀵발송'],['guide','📖','사용법'],['home','🏠','홈'],['install','📲','설치'],['active','📋','진행중'],['me','👤','내정보']];
  return '<div style="display:flex;border-top:1px solid var(--line);padding-bottom:21px;">'
    + t.map(function(x){
        /* find 는 구인의, apps 는 진행중의 하위 화면 — 부모 탭을 켜둔다 */
        var on = (tab===x[0])
              || (x[0]==='jobs'   && tab==='find')
              || (x[0]==='active' && tab==='apps');
        if(x[0]==='home'){
          return '<div onclick="tab=\'home\';renderMain()" style="flex:1.1;text-align:center;padding:10px 0 9px;cursor:pointer;'
            +'border-bottom:3px solid '+(on?'var(--orange)':'transparent')+';">'
            +'<div style="width:44px;height:44px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;'

        var lg = (x[0]==='me')

          : '';

/* ── 알림 문자 (서버가 발송. 앱에는 알리고 키 없음) ── */
function notifySMS(appId, kind){
  var u = window._auth && window._auth.currentUser;
  if(!u || !appId) return Promise.resolve({ok:false});
  return u.getIdToken()
    .then(function(t){
      return fetch('https://cosroad.vercel.app/api/rc-notify', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ idToken:t, appId:appId, kind:kind })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(!j || !j.ok){ console.warn('알림 문자 미발송:', j && j.message); }
      return j || {ok:false};
    })
    .catch(function(e){ console.warn('알림 문자 실패', e); return {ok:false}; });
}

var geoBusy = false;
function askGeo(){
  if(!confirm('「내 위치」를 쓰려면 위치정보 이용에 동의해야 합니다.\n\n· 출발지 주소를 채우는 용도로만 사용합니다\n· 위치는 저장하지 않습니다\n· 언제든 철회할 수 있습니다\n\n동의하시겠습니까?')) return;
  C.agreeGeo = true; save(); renderMain();
  toast('✅ 동의했습니다. 「내 위치」를 쓸 수 있습니다.');
}
function useMyLocation(){
  if(!C.agreeGeo){ askGeo(); return; }
  if(geoBusy) return;
  if(!navigator.geolocation){ toast('이 브라우저는 위치를 지원하지 않습니다.'); return; }

  geoBusy = true;
  toast('위치를 확인하는 중입니다...');
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    fetch('https://cosroad.vercel.app/api/rc-quick', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'reverse', lat:lat, lon:lon })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      geoBusy = false;
      if(!j || !j.ok){ toast((j&&j.message)||'주소를 찾지 못했습니다. 직접 검색해 주세요.'); return; }
      var keep = (Q.from && Q.from.detail) || '';
      Q.from = { name:j.name, addr:j.addr, lat:j.lat, lon:j.lon, detail:keep };
      save(); recalc();
      toast('📍 내 위치로 설정했습니다.');
    })
    .catch(function(){ geoBusy=false; toast('주소 변환에 실패했습니다. 직접 검색해 주세요.'); });
  }, function(err){
    geoBusy = false;
    if(err.code === 1) toast('위치 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.');
    else toast('위치를 가져오지 못했습니다. 직접 검색해 주세요.');
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:0 });
}

var NIGHT_RATE = 1.2;   // 22~06시
var WEEKEND_RATE = 1.1; // 토·일
function calcFare(veh, km, when){
  var f = FARE[veh]; if(!f) return 0;
  var fare = f.base;
  if(km > f.baseKm) fare += Math.ceil(km - f.baseKm) * f.perKm;
  var d = when || new Date();
  var h = d.getHours(), w = d.getDay();
  if(h >= 22 || h < 6) fare *= NIGHT_RATE;
  if(w === 0 || w === 6) fare *= WEEKEND_RATE;
  return Math.round(fare / 100) * 100;
}
function surchargeText(when){
  var d = when || new Date();
  var h = d.getHours(), w = d.getDay();
  var t = [];
  if(h >= 22 || h < 6) t.push('심야 +20%');
  if(w === 0 || w === 6) t.push('주말 +10%');
  return t.join(' · ');
}

function recalc(){
  fareQ = 0;
  if(!Q.from || !Q.to){ distKmQ = 0; return; }
  if(calcing) return;
  calcing = true;
  renderMain();
  fetch('https://cosroad.vercel.app/api/rc-quick', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'route', sx:Q.from.lon, sy:Q.from.lat, ex:Q.to.lon, ey:Q.to.lat })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    calcing = false;
    if(j && j.ok){
      distKmQ = j.distanceM / 1000;
      timeMinQ = Math.max(1, Math.round(j.timeSec / 60));
      if(Q.vehicle && (!FARE[Q.vehicle] || distKmQ > FARE[Q.vehicle].maxKm)) Q.vehicle = '';
      if(Q.vehicle) fareQ = calcFare(Q.vehicle, distKmQ);
    } else {
      distKmQ = 0;
      toast((j && j.message) || '거리를 계산하지 못했습니다.');
    }
    renderMain();
  })
  .catch(function(){
    calcing = false; distKmQ = 0;
    toast('거리 계산에 실패했습니다.');
    renderMain();
  });
}
function pickVehQ(k){

  var cnt = apps.filter(function(a){return a.jobId===j.id;}).length;
  var msg = '「'+(j.title||'공고')+'」을(를) 삭제할까요?\n\n되돌릴 수 없습니다.';
  if(cnt) msg += '\n⚠️ 지원자 '+cnt+'명의 지원 내역도 목록에서 사라집니다.';
  if(!confirm(msg)) return;
  var fb=window._fb, db=window._db;
  /* 공고에 딸린 지원·제안 내역도 함께 지운다 (안 지우면 유령 지원서가 남는다) */
  fb.getDocs(fb.query(fb.collection(db,'applications'), fb.where('jobId','==',j.id)))
    .then(function(snap){
      var t=[]; snap.forEach(function(d){ t.push(fb.deleteDoc(fb.doc(db,'applications',d.id))); });
      return Promise.all(t);
    })
    .then(function(){ return fb.deleteDoc(fb.doc(db,'jobs',j.id)); })
    .then(function(){ toast('공고를 삭제했습니다.'); loadAll(); })
    .catch(function(e){ toast('삭제 실패: '+(e.code||e.message)); });
}
/* 마감일이 지났는가 */
function isExpired(j){
  if(!j || !j.deadline || j.deadline==='채용시 마감') return false;
  var today = new Date().toISOString().slice(0,10);
  return j.deadline < today;
}
/* 공고 수정 — 기존 값을 폼에 채워 넣고 연다 */
var editingJobId = null;
function editJob(i){
  var j = myJobs[i]; if(!j) return;
  editingJobId = j.id;
  JF = {
    title:j.title||'', jobType:j.jobType||'', area:j.area||'', workType:j.workType||'',
    license:j.license||'무관', vehicle:j.vehicle||'회사 차량 제공',
    days:(j.days||[]).slice(),
    slots:(j.slots && j.slots.length) ? j.slots.map(function(x){return {s:x.s,e:x.e};}) : [{s:'',e:''}],
    hours:j.hours||'', count:j.count||'1명',
    deadline:(j.deadline && j.deadline!=='채용시 마감') ? j.deadline : '',
    deadlineOpen:(!j.deadline || j.deadline==='채용시 마감'),
    desc:j.desc||''
  };
  openJobForm();
}

/* ── 지원자 ── */
function openApp(i){
  curApp = apps[i];
  /* 처음 열면 자동으로 '열람함' — 기사가 진행 상황을 알 수 있게 */
  if(curApp && curApp.status==='applied' && curApp.direction!=='offer'){
    var _fb=window._fb;
    _fb.updateDoc(_fb.doc(window._db,'applications',curApp.id), { status:'viewed' })
      .then(function(){ curApp.status='viewed'; loadAll(); })
      .catch(function(){});
  }
  var d = drivers.filter(function(x){ return x.uid===curApp.driverId; })[0] || {};
  var locked = (curApp.status==='accepted' || curApp.status==='declined');
  var STS = locked ? [] : [['viewed','열람함'],['contact','연락중'],['hired','채용확정'],['rejected','미선정']];
  document.getElementById('mTitle').textContent = curApp.driverName+' 기사님';
  document.getElementById('mBody').innerHTML =
     '<div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:12px;">'+esc(curApp.jobTitle)+' 지원</div>'
    + row('연락처','<a href="tel:'+esc(curApp.driverPhone)+'" style="color:var(--navy);font-weight:800;">'+fmtPhone(curApp.driverPhone)+'</a>')
    + row('면허', esc(d.license||'-')) + row('보유 차량', esc((d.vehicles||[]).join(', ')||'-'))
    + row('경력', esc(d.career||'-')) + row('활동 지역', esc((d.areas||[]).join(' · ')||'-'))
    + row('희망 근무형태', esc((d.worktypes||[]).join(', ')||'-'))
    + row('면허 인증', d.licenseVerify==='verified'?'✅ 인증됨':(d.licenseVerify==='pending'?'검수중':'미인증'))
    + (d.intro? '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);white-space:pre-wrap;">'+esc(d.intro)+'</div>':'')
    + '<div class="field" style="margin-top:18px;"><label class="lb">상태 변경</label><div class="opts col2">'
    + STS.map(function(s){ return '<div class="opt '+(curApp.status===s[0]?'on':'')+'" onclick="setAppStatus(\''+s[0]+'\')">'+s[1]+'</div>'; }).join('')
    + '</div></div>'
    + '<a class="btn btn-main" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box;" href="tel:'+esc(curApp.driverPhone)+'">📞 전화하기</a>';
  document.getElementById('modal').classList.add('on');
}
function setAppStatus(s){
  if(!curApp) return;
  var fb=window._fb;
  fb.updateDoc(fb.doc(window._db,'applications',curApp.id), { status:s })
    .then(function(){
      if(s==='hired'||s==='contact'||s==='rejected'){
        notifySMS(curApp.id, s).then(function(j){
          if(j && !j.ok && !j.skipped){ toast('상태는 바뀌었지만 기사 알림 문자는 못 보냈습니다.'); }
        });
      }
      curApp.status=s; toast('상태를 변경했습니다.'); loadAll(); closeModal(); })
    .catch(function(e){ toast('실패: '+(e.code||e.message)); });
}

/* ── 기사 상세 · 제안 ── */
function openDriver(i){
  var d = drivers[i];
  document.getElementById('mTitle').textContent = (d.name||'기사')+' 기사님';
  var openJobs = myJobs.filter(function(j){ return j.status==='open'; });
  document.getElementById('mBody').innerHTML =
     row('면허', esc(d.license||'-')) + row('보유 차량', esc((d.vehicles||[]).join(', ')||'-'))
   + row('경력', esc(d.career||'-')) + row('활동 지역', esc((d.areas||[]).join(' · ')||'-'))
   + row('희망 근무형태', esc((d.worktypes||[]).join(', ')||'-'))
   + row('면허 인증', d.licenseVerify==='verified'?'✅ 인증됨':(d.licenseVerify==='pending'?'검수중':'미인증'))
   + (d.intro? '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);white-space:pre-wrap;">'+esc(d.intro)+'</div>':'')
   + '<div class="field" style="margin-top:18px;"><label class="lb">제안할 공고 선택</label>'
   + (openJobs.length
      ? '<div class="hint" style="margin:0 0 10px;">👆 공고를 누르면 이 기사님께 <b>채용 제안</b>이 발송됩니다.</div>'
        + '<div class="opts">'
        + openJobs.map(function(j,k){
            return '<div class="offer-pick" onclick="sendOffer('+k+','+i+')" title="제안을 보내려면 클릭하세요">'
              +'<span class="ico">📢</span>'
              +'<span class="tt">'+esc(j.title)+'</span>'
              +'<span class="arw">›</span>'
              +'<span class="tip">👆 제안을 보내려면 클릭하세요</span>'
              +'</div>';
          }).join('')
        + '</div>'
      : '<div class="hint">모집중인 공고가 없습니다. 먼저 공고를 등록해 주세요.</div>')
   + '</div>';
  document.getElementById('modal').classList.add('on');
}
function sendOffer(jobIdx, driverIdx){
  var u=window._auth.currentUser, fb=window._fb;
  var openJobs = myJobs.filter(function(x){ return x.status==='open'; });
  var j = openJobs[jobIdx];
  var d = drivers[driverIdx];
  if(!j || !d){ toast('공고 또는 기사 정보를 찾을 수 없습니다.'); return; }
  var jobId = j.id, driverId = d.uid, driverName = d.name, driverPhone = d.phone;
  var dup = apps.some(function(a){ return a.jobId===jobId && a.driverId===driverId; });
  if(dup){ toast('이미 지원/제안된 기사입니다.'); return; }
  fb.addDoc(fb.collection(window._db,'applications'), {
    jobId:jobId, jobTitle:j.title, company:C.company, companyId:u.uid,
    driverId:driverId, driverName:driverName, driverPhone:driverPhone,
    direction:'offer', status:'applied', createdAt: fb.serverTimestamp()
  }).then(function(ref){
    closeModal(); toast('✅ 제안을 보냈습니다!');
    notifySMS(ref.id, 'offer').then(function(j){
      if(j && !j.ok && !j.skipped){ toast('제안은 저장됐지만 기사 알림 문자는 못 보냈습니다.'); }
    });
    loadAll();
  })
    .catch(function(e){ toast('제안 실패: '+(e.code||e.message)); });
}

/* ── 회원 탈퇴 (개인정보 삭제 요구권) ── */
function withdraw(){
  if(!confirm('정말 탈퇴하시겠습니까?\n\n· 업체 정보, 등록한 공고, 지원자 내역이 모두 삭제됩니다\n· 되돌릴 수 없습니다')) return;
  if(!confirm('마지막 확인입니다.\n\n탈퇴하면 복구할 수 없습니다. 진행할까요?')) return;

  var u = window._auth.currentUser;
  if(!u){ toast('로그인 정보가 없습니다.'); return; }
  var fb = window._fb, db = window._db;
  toast('탈퇴 처리 중입니다...');

  fb.getDocs(fb.query(fb.collection(db,'jobs'), fb.where('companyId','==',u.uid)))
    .then(function(snap){
      var t=[]; snap.forEach(function(d){ t.push(fb.deleteDoc(fb.doc(db,'jobs',d.id))); });
      return Promise.all(t);
    })
    .then(function(){
      return fb.getDocs(fb.query(fb.collection(db,'applications'), fb.where('companyId','==',u.uid)));
    })
    .then(function(snap){
      var t=[]; snap.forEach(function(d){ t.push(fb.deleteDoc(fb.doc(db,'applications',d.id))); });
      return Promise.all(t);
    })
    .then(function(){ return fb.deleteDoc(fb.doc(db,'companies',u.uid)); })
    .then(function(){
      clearLocal();
      alert('탈퇴가 완료되었습니다.\n그동안 이용해 주셔서 감사합니다.');
      return window._fb.signOut(window._auth).catch(function(){});
    })
    .then(function(){ location.replace('index.html'); })
    .catch(function(e){ toast('탈퇴 실패: '+((e&&e.code)||e.message)); });
}

function clearLocal(){
  try{
    localStorage.removeItem('rc_role');
    localStorage.removeItem('rc_driver');
    localStorage.removeItem('rc_company');
    localStorage.removeItem('rc_home');
    localStorage.removeItem('rj_goto');
  }catch(e){}
}
function switchRole(){ clearLocal(); location.replace('index.html'); }
function goHome(){
  try{ localStorage.setItem('rc_home','1'); }catch(e){}
  location.replace('index.html');
}
function logout(){
  stopRealtime();
  clearLocal();
  C = { phone:'', company:'', manager:'', bizType:'', area:'', agree1:false, agree2:false };
  if(live()){
    window._fb.signOut(window._auth)
      .catch(function(){})
      .then(function(){ location.replace('index.html'); });
  } else { location.replace('index.html'); }
}

/* ── 부팅 ── */
/* ═══ 실시간: 지원자가 들어오면 즉시 뜬다 ═══ */
var unsubApps = null, unsubOrders = null;
var lastOStatus = {};
var seenApps = {}, firstApps = true;

function stopRealtime(){ try{ if(unsubApps) unsubApps(); }catch(e){} try{ if(unsubOrders) unsubOrders(); }catch(e){} unsubApps=unsubOrders=null; }
function startRealtime(){
  var u = window._auth && window._auth.currentUser;
  if(!u || !live()) return;
  var fb = window._fb;
  stopRealtime();
  firstApps = true;
  /* 내가 보낸 퀵 — 실시간 */
  unsubOrders = fb.onSnapshot(
    fb.query(fb.collection(window._db,'orders'), fb.where('customerId','==',u.uid)),
    function(snap){
      myOrders = [];
      var changed = null;
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id; myOrders.push(o);
        if(lastOStatus[o.id] && lastOStatus[o.id] !== o.status) changed = o;
        lastOStatus[o.id] = o.status;
      });
      myOrders.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      if(changed){
        var msg = { accepted:'🚚 기사님이 배정되었습니다!', picked:'📦 물품을 픽업했습니다.',
                    done:'✅ 배송이 완료되었습니다.', canceled:'주문이 취소되었습니다.' }[changed.status];
        if(msg){ toast(msg); try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){} }
      }
      if(mode==='main') renderMain();
    },
    function(e){ console.warn('주문 구독 실패', e); }
  );

  unsubApps = fb.onSnapshot(
    fb.query(fb.collection(window._db,'applications'), fb.where('companyId','==',u.uid)),
    function(snap){
      var fresh = 0;
      apps = [];
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id; apps.push(o);
        if(!seenApps[o.id]){ if(!firstApps && o.direction==='apply') fresh++; seenApps[o.id]=true; }
      });
      if(fresh){
        toast('🔔 새 지원자 ' + fresh + '명이 도착했습니다!');
        try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){}
      }
      firstApps = false;
      if(mode==='main') renderMain();
    },
    function(e){ console.warn('지원자 구독 실패', e); }
  );
}

/* 그라데이션 정의를 문서에 한 번만 심는다 (아이콘들이 참조) */
function icoDefs(){
  if(document.getElementById('ri-defs')) return;
  var d = document.createElement('div');
  d.id = 'ri-defs'; d.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;';
  d.innerHTML = ICO_DEF;
  document.body.appendChild(d);
}

function boot(){
  icoDefs();
  if(!live()){ render(); return; }
  window._fb.onAuthStateChanged(window._auth, function(u){
    if(!u){ mode='signup'; render(); return; }
    var fb=window._fb;
    fb.getDoc(fb.doc(window._db,'companies',u.uid)).then(function(s){
      if(s.exists()){
        var p=s.data();
        C.company=p.company; C.manager=p.manager; C.phone=p.phone; C.bizType=p.bizType; C.area=p.area;
        try{ localStorage.setItem('rc_role','company'); localStorage.removeItem('rc_driver'); }catch(e){}
        save(); enterMain();
      } else { mode='signup'; render(); }
    }).catch(function(){ mode='signup'; render(); });
  });
}
document.addEventListener('fbready', boot);
setTimeout(function(){ if(!document.getElementById('view').innerHTML) boot(); }, 1400);
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
