<title>ROADJOB 로드잡 — 기사 가입</title>
<style>
:root{--navy:#0F2A47;--navy-soft:#E8EEF5;--orange:#EA580C;--orange-soft:#FFF4ED;
--ink:#1A2233;--ink-soft:#5A6478;--line:#E4E8EF;--bg:#F6F8FB;--white:#fff;--ok:#12B76A;--err:#F04438;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.top{position:sticky;top:0;z-index:20;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 16px;}
.back{border:none;background:none;font-size:22px;color:var(--ink-soft);cursor:pointer;padding:0 4px;}
.top h1{font-size:16px;font-weight:800;margin:0;flex:1;}
.hbrand{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hbrand .bn{flex:none;font-size:16px;font-weight:800;letter-spacing:-.2px;color:var(--ink);line-height:1.1;}
.hbrand .bn .hcos{font-size:10px;font-weight:800;color:var(--orange);vertical-align:2px;}
.hbrand .tx{min-width:0;text-align:right;}
.hbrand .bt{font-size:11px;font-weight:700;color:var(--ink-soft);line-height:1.3;}
.hbrand .bt2{font-size:10px;font-weight:600;color:#9AA4B4;line-height:1.3;}
.prog{height:4px;background:var(--line);}
.prog i{display:block;height:100%;background:var(--orange);width:0;transition:.3s;}
.wrap{flex:1;padding:22px 18px 120px;}
.step-title{font-size:24px;font-weight:850;letter-spacing:-.02em;margin:0 0 8px;}
.step-desc{font-size:15px;color:var(--ink-soft);margin:0 0 24px;}
.field{margin-bottom:20px;}
label.lb{display:block;font-size:14px;font-weight:700;margin-bottom:8px;}
.req{color:var(--orange);}
input[type=text],input[type=tel],select,textarea{width:100%;padding:15px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:var(--white);color:var(--ink);font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);}
textarea{min-height:90px;resize:vertical;}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:6px;}
.opts{display:grid;gap:8px;}
.opts.col2{grid-template-columns:1fr 1fr;}
.opt{border:1.5px solid var(--line);background:var(--white);border-radius:12px;padding:14px 12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;}
.opt.on{border-color:var(--navy);background:var(--navy);color:#fff;}
.opt .ico{display:block;font-size:22px;margin-bottom:4px;}
.foot{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--white);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom));}
.btn{width:100%;padding:17px;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-main{background:var(--navy);color:#fff;}
.btn-main:disabled{background:#C4CBD6;cursor:not-allowed;}
.btn-ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--navy);}
.agree-all{border:1.5px solid var(--navy);background:var(--navy-soft);border-radius:12px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;font-weight:800;font-size:16px;}
.agree{display:flex;align-items:flex-start;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.agree:last-child{border-bottom:none;}
.chk{flex:none;width:24px;height:24px;border:2px solid #C4CBD6;border-radius:50%;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;font-weight:900;transition:.15s;}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff;}
.agree .tx{flex:1;font-size:14.5px;}
.tag-req{font-size:11px;color:var(--orange);font-weight:800;}
.tag-opt{font-size:11px;color:var(--ink-soft);font-weight:800;}
.viewmore{font-size:12.5px;color:var(--ink-soft);text-decoration:underline;background:none;border:none;cursor:pointer;padding:4px 0 0;}
.upload{display:block;border:2px dashed #C4CBD6;border-radius:14px;padding:28px 16px;text-align:center;background:var(--white);cursor:pointer;}
.upload .big{font-size:34px;}
.upload p{margin:8px 0 0;font-size:14px;color:var(--ink-soft);}
.preview{position:relative;border-radius:14px;overflow:hidden;border:1.5px solid var(--line);}
.preview img{width:100%;display:block;}
.preview .del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;}
.done{text-align:center;padding:40px 0 10px;}
.done .mark{width:76px;height:76px;border-radius:50%;background:var(--ok);color:#fff;font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px;text-align:left;}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--ink-soft);}
.row .v{font-weight:700;text-align:right;}
.badge{display:inline-block;background:var(--orange-soft);color:var(--orange);font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;margin-left:6px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;}
.modal.on{display:flex;}
.sheet{background:#fff;width:100%;max-width:520px;margin:0 auto;border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto;}
.sheet h3{margin:0 0 14px;font-size:18px;font-weight:850;}
.sheet .body{font-size:14px;color:var(--ink-soft);line-height:1.8;}
.sheet .body b{color:var(--ink);}
.brand{display:flex;align-items:center;justify-content:center;gap:2px;font-weight:900;letter-spacing:-.02em;}
.brand .cos{font-size:15px;color:var(--orange);opacity:.9;}
.brand .rc{font-size:26px;color:var(--navy);}
/* 옛 시작화면(.hero/.pt/.pts)은 게이트 화면으로 대체되어 제거함 */
.demo{background:#FFF7E6;border:1px solid #FFE0A3;color:#8A5A00;border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:700;margin-bottom:16px;}
.note-mid{background:#F2F4F7;border-radius:10px;padding:12px;margin-top:16px;font-size:12px;color:var(--ink-soft);line-height:1.7;}
.note-mid b{color:var(--ink);}
.gate{position:fixed;inset:0;max-width:520px;margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;z-index:30;}
.gate-tab{background:#fff;display:flex;padding:9px 0 7px;cursor:pointer;}
.gate-tab.top{padding-top:calc(9px + env(safe-area-inset-top));}
.gate-tab.bot{border-top:1px solid var(--line);padding-bottom:calc(9px + env(safe-area-inset-bottom));}
/* 안내 + 로그인 한 줄 */
.gate-bar{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:11.5px;font-weight:800;}
.gate-bar .tx{flex:1;min-width:0;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gate-bar .lg{flex:none;background:none;border:0;padding:2px 0;font-family:inherit;font-size:11.5px;font-weight:800;
  cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.gate-bar.co{background:var(--orange-soft);color:#993C1D;border-bottom:1px solid var(--line);}
.gate-bar.co .lg{color:#993C1D;}
.gate-bar.dr{background:var(--navy-soft);color:var(--navy);}
.gate-bar.dr .lg{color:var(--navy);}
.gate-tab .gi{flex:1;position:relative;text-align:center;color:#9AA4B4;transition:.15s;}
.gate-tab .gi.mid{flex:1.15;}
.gate-tab .gi:active{transform:scale(.94);}
.gate-tab .gi .e{font-size:24px;line-height:1.1;}
.gate-tab .gi .n{font-size:11px;margin-top:4px;font-weight:800;letter-spacing:-.8px;white-space:nowrap;}
.gate-tab .gi .ball{width:46px;height:46px;margin:0 auto;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:24px;color:#fff;}
/* 앱 이름 — 고정. 문구는 탭 라벨(11px)과 같은 크기 */
.gate-name{flex:none;text-align:center;padding:10px 14px 8px;}
.gate-name .brand .cos{font-size:12px;}
.gate-name .brand .rc{font-size:22px;}
.gate-name .tag{margin-top:4px;font-size:11px;font-weight:800;color:var(--ink-soft);
  line-height:1.5;letter-spacing:-.8px;word-break:keep-all;}
.gate-body{flex:1;display:flex;flex-direction:column;padding:0 14px 8px;min-height:0;overflow-y:auto;}
/* 넘칠 때 위가 잘리지 않는 가운데 정렬 (justify-content:center 는 위를 잘라먹음) */
.gate-mid{margin:auto 0;width:100%;}
/* 네모칸은 고정. 안의 설명만 바뀐다 (넘길 때 커졌다 작아졌다 하지 않게) */
/* 네모칸은 화면 높이에 맞춰 늘고 준다. 좁은 폰 186 · 넓으면 최대 300 */
.slide{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 16px;text-align:center;
  height:clamp(210px, 36vh, 320px);display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;box-sizing:border-box;}
.slide.in{animation:slide-in .28s ease-out;}
@keyframes slide-in{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:none;}}
/* 퀵 = 움직이는 일. 차가 좌우로 다니게 */
.qk{display:inline-block;animation:qk-run 1.6s ease-in-out infinite;}
.ri{height:26px;width:auto;display:block;margin:0 auto;}
.gate-tab .gi .e .ri{height:25px;}
/* 퀵 트럭은 좌우로 달리므로 조금 작게 — 옆 칸 침범 방지 */
.qk .ri{height:23px;}
.gate-tab .gi .e .qk .ri{height:22px;}
@keyframes qk-run{0%,100%{transform:translateX(-9px);}50%{transform:translateX(9px);}}
@media (prefers-reduced-motion:reduce){.qk,.slide.in{animation:none;}}
/* 안내·설치 탭 안 제목 옆 아이콘 (이모지 대체 — 폰마다 다르게 보이던 것) */
.hi{display:inline-block;vertical-align:-4px;margin-right:6px;}
.hi .ri{height:20px;display:inline-block;margin:0;}
/* 홈 카드 왼쪽 큰 아이콘.
   SVG 는 그림 둘레에 여백이 있어 같은 높이라도 이모지보다 작아 보인다.
   (트럭은 세로칸의 65%%만 그림) → 그만큼 키운다. */
.ci{flex:none;display:flex;align-items:center;justify-content:center;}
.ci .ri{height:48px;}
.hi.big .ri{height:24px;}
.slide .ic{line-height:1;}
.slide .ic .ri{height:clamp(42px, 8vh, 66px);}
.slide .ti{font-size:clamp(17px, 2.4vh, 21px);font-weight:850;margin-top:11px;word-break:keep-all;line-height:1.35;}
.slide .de{font-size:clamp(12.5px, 1.8vh, 15px);color:var(--ink-soft);margin-top:7px;line-height:1.55;word-break:keep-all;}
.slide .go{margin-top:12px;font-size:clamp(12px, 1.7vh, 14px);font-weight:800;color:var(--orange);word-break:keep-all;}
/* 슬라이드 점 — 크고 진하게. 누르기 쉽도록 여백까지 클릭 범위 */
.dots{display:flex;justify-content:center;align-items:center;gap:3px;margin-top:9px;}
.dots i{width:9px;height:9px;border-radius:50%;background:#A9B2C0;transition:.2s;cursor:pointer;
  box-sizing:content-box;padding:6px 4px;background-clip:content-box;}
.dots i.on{width:22px;border-radius:20px;background:var(--orange);background-clip:content-box;}
.arw-btn{flex:none;width:clamp(34px, 5vh, 42px);height:clamp(34px, 5vh, 42px);border-radius:50%;border:1px solid var(--line);
  background:#fff;color:#9AA4B4;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.arw-btn:active{background:var(--bg);}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(20,28,42,.94);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:200;display:none;max-width:88%;text-align:center;}

/* ═══════════ 업체 화면 전용 (company.html 통합) ═══════════ */
.hero{text-align:center;padding:56px 0 30px;}
.hero .sub{font-size:15px;color:var(--ink-soft);margin-top:10px;}
.hero .pts{margin-top:30px;display:grid;gap:10px;text-align:left;}
.pt{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;display:flex;gap:12px;align-items:center;}
.pt .e{font-size:24px;}
.pt .t{font-size:14.5px;font-weight:700;}
.pt .d{font-size:13px;color:var(--ink-soft);}
.offer-pick{position:relative;border:1.5px solid var(--line);background:var(--white);border-radius:12px;
  padding:15px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;}
.offer-pick:hover{border-color:var(--orange);background:var(--orange-soft);}
.offer-pick .ico{font-size:18px;flex:none;}
.offer-pick .tt{flex:1;font-size:15px;font-weight:700;color:var(--ink);}
.offer-pick .arw{flex:none;font-size:20px;color:#C4CBD6;}
.offer-pick:hover .arw{color:var(--orange);}
.offer-pick .tip{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);
  background:rgba(20,28,42,.94);color:#fff;font-size:12.5px;font-weight:700;white-space:nowrap;
  padding:8px 12px;border-radius:9px;opacity:0;pointer-events:none;transition:.15s;z-index:10;}
.offer-pick:hover .tip{opacity:1;}
.addr-row{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:#fff;
  border-radius:12px;padding:13px;cursor:pointer;transition:.15s;}
.addr-row:hover{border-color:var(--navy);}
.addr-row .dot{flex:none;width:10px;height:10px;border-radius:50%;}
.addr-row .tx{flex:1;font-size:14.5px;color:var(--ink);}
.addr-row .tx.ph{color:#9AA4B4;}
.addr-row .arw{flex:none;color:#C4CBD6;font-size:18px;}
.veh{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px 10px;text-align:center;cursor:pointer;transition:.15s;}
.veh.on{border-color:var(--orange);background:var(--orange-soft);}
.veh.off{opacity:.4;cursor:not-allowed;}
.veh .e{font-size:24px;display:block;}
.veh .n{font-size:13.5px;font-weight:800;margin-top:3px;}
.veh .p{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.veh.on .p{color:var(--orange);font-weight:800;}
.fare-box{background:var(--navy);color:#fff;border-radius:16px;padding:18px;margin-top:16px;}
.fare-box .big{font-size:30px;font-weight:900;letter-spacing:-.02em;}
.sr{border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:8px;cursor:pointer;background:#fff;}
.sr:hover{border-color:var(--navy);background:var(--navy-soft);}
.sr .n{font-size:14.5px;font-weight:800;}
.sr .a{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
</style>
</head>

    <div class="body" id="mBody"></div>

</div>

function ico_h(key, big){ return '<span class="hi'+(big?' big':'')+'">'+(ICO[key]||'')+'</span>'; }

function icoFor(tab, role){
  if(tab === 'jobs')  return ICO[role === 'company' ? 'jobs_c'  : 'jobs_d'];
  if(tab === 'quick') return '<span class="qk">' + ICO[role === 'company' ? 'quick_c' : 'quick_d'] + '</span>';
  return ICO[tab] || '';
}

function gateTabHtml(tabs, role, cls){
  return '<div class="gate-tab '+cls+'">'
    + tabs.map(function(x){
        if(x[0]==='home'){
          return '<div class="gi mid" onclick="gateGo(\''+role+'\',\'home\')">'
            +'<div class="ball" style="background:'+(role==='company'?'var(--orange)':'var(--navy)')+';">'+ICO.home+'</div>'
            +'<div class="n" style="color:'+(role==='company'?'var(--orange)':'var(--navy)')+';">홈</div></div>';
        }
        return '<div class="gi" onclick="gateGo(\''+role+'\',\''+x[0]+'\')">'
          +'<div class="e">'+icoFor(x[0],role)+'</div><div class="n">'+x[1]+'</div></div>';
      }).join('')
    +'</div>';
}

  var pic = (ICO[sl.ic] || '');

var slideTimer = null;

/* 자동 넘김 — 사람이 손대면 4초를 새로 센다 (읽는 중에 넘어가면 안 되니까) */
function slideAuto(){
  slideStop();
  slideTimer = setInterval(function(){
    /* 게이트가 아니면 스스로 멈춘다 (로그인 후에도 도는 것 방지) */
    if(!document.getElementById('slide')){ slideStop(); return; }
    slideTo(slideIdx + 1, true);
  }, 4000);
}
function slideStop(){ if(slideTimer){ clearInterval(slideTimer); slideTimer = null; } }

function slideTo(i, auto){
  slideIdx = (i + SLIDES.length) % SLIDES.length;
  var el = document.getElementById('slide');
  if(el){
    /* 이름·탭은 그대로 두고 설명만 갈아끼운다 (깜빡임 없음, 스와이프 연결도 유지) */
    el.innerHTML = slideInner();
    var d = document.getElementById('dots');
    if(d) d.innerHTML = dotsInner();
    el.classList.remove('in'); void el.offsetWidth; el.classList.add('in');
  } else {
    var g = document.getElementById('gate');
    if(g && g.parentNode){ g.parentNode.innerHTML = gateView(); bindSwipe(); }
  }
  if(!auto) slideAuto();   // 사람이 넘겼으면 타이머를 새로 시작
}
function slideMove(d){ slideTo(slideIdx + d); }

/* 손가락으로 밀어서 넘기기 */
function bindSwipe(){
  var el = document.getElementById('slide');
  if(!el) return;
  var x0 = null;
  el.addEventListener('touchstart', function(e){ x0 = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', function(e){
    if(x0 === null) return;
    var dx = e.changedTouches[0].clientX - x0;
    if(Math.abs(dx) > 40) slideMove(dx < 0 ? 1 : -1);
    x0 = null;
  }, {passive:true});
}

/* 탭을 누르면 그 역할로 가입/로그인 → 끝나면 그 탭이 열린다 */

function valid(){
  var s=STEPS[step];
  if(s==='phone') return /^01[0-9]{8,9}$/.test(D.phone);
  if(s==='code'){ var e=document.getElementById('f-code'); return !!e && e.value.length===6; }
  if(s==='agree') return D.agree1 && D.agree2;
  if(s==='p1') return D.name.trim().length>0 && D.areas.length>0;
  if(s==='p2') return !!D.license && D.vehicles.length>0;
  if(s==='p3') return !!D.career && D.worktypes.length>0;
  return true;
}
function chk(){ var b=document.getElementById('nx'); if(b) b.disabled=!valid()||busy; save(); }
function setBusy(v,label){ busy=v; var b=document.getElementById('nx'); if(b){ b.disabled=v||!valid(); if(label) b.textContent=label; } }

// reCAPTCHA를 매번 깨끗하게 새로 만든다 (재시도 시 'already been rendered' 오류 방지)
function makeRecaptcha(){
  try{ if(recaptcha) recaptcha.clear(); }catch(e){}
  recaptcha = null;
  var host = document.getElementById('recaptcha');
  if(host && host.parentNode){
    var fresh = document.createElement('div');
    fresh.id = 'recaptcha';
    host.parentNode.replaceChild(fresh, host);
  }
  recaptcha = new window._fb.RecaptchaVerifier(window._auth, 'recaptcha', { size:'invisible' });
  return recaptcha;
}
function sendCode(){
  if(!valid()||busy) return;
  save();
  if(!live()){ next(); return; }
  setBusy(true,'발송 중...');
  try{
    var verifier = makeRecaptcha();
    var intl = '+82' + D.phone.replace(/^0/,'');
    window._fb.signInWithPhoneNumber(window._auth, intl, verifier)
      .then(function(res){ confirmResult=res; setBusy(false,'인증번호 받기'); next(); })
      .catch(function(e){
        setBusy(false,'인증번호 받기');
        toast('발송 실패: '+(e.code||e.message));
        try{ verifier.clear(); }catch(_){} recaptcha=null;
      });
  }catch(e){ setBusy(false,'인증번호 받기'); toast('오류: '+e.message); recaptcha=null; }
}
function verifyCode(){
  if(!valid()||busy) return;
  if(!live()){ next(); return; }
  var code = document.getElementById('f-code').value;
  setBusy(true,'확인 중...');
  confirmResult.confirm(code)
    .then(function(){ setBusy(false,'확인'); next(); })
    .catch(function(){ setBusy(false,'확인'); toast('인증번호가 올바르지 않습니다.'); });
}
function finish(){
  save();
  if(!live()){ next(); return; }
  var u = window._auth.currentUser;
  if(!u){ toast('인증 정보가 없습니다. 처음부터 다시 시도해 주세요.'); return; }
  setBusy(true,'저장 중...');
  var fb = window._fb;

  var profile = {
    uid:u.uid, phone:D.phone, name:D.name, areas:D.areas,
    license:D.license, vehicles:D.vehicles, career:D.career,
    worktypes:D.worktypes, pay:'협의', intro:D.intro||'',
    insurance:!!D.insurance, helmet:!!D.helmet, agreeGeo:!!D.agreeGeo
  };

  if(joined){
    /* 이미 가입한 사람이 프로필을 고치는 중.
       동의 기록·가입일은 건드리지 않는다 (법적 증빙).
       면허 인증 상태도 새 사진을 올릴 때만 바꾼다. */
    profile.licenseVerify = D.licenseImg ? 'pending' : (D.licenseVerify || 'none');
  } else {
    profile.agreePrivacy     = D.agree1;
    profile.agreeUniqueId    = D.agree2;
    profile.agreeOpenProfile = D.agree3;
    profile.agreedAt         = fb.serverTimestamp();
    profile.createdAt        = fb.serverTimestamp();
    profile.licenseVerify    = D.licenseImg ? 'pending' : 'none';
  }

  var task = Promise.resolve();
  if(D.licenseImg){
    setBusy(true,'면허증 올리는 중...');
    var r = fb.ref(window._st, 'license_review/'+u.uid+'.jpg');

/* 사진을 자동으로 줄인다. 요즘 폰 사진은 2~5MB라 그대로 쓰면 앱이 멈춘다.
   긴 변 1600px, JPEG 품질 0.8 -> 보통 300KB~1MB. 면허 확인에는 충분하다. */
function shrinkImage(file, cb){
  var reader = new FileReader();
  reader.onerror = function(){ cb('사진을 읽지 못했습니다. 다른 사진을 선택해 주세요.'); };
  reader.onload = function(e){
    var img = new Image();
    img.onerror = function(){ cb('사진 형식을 읽지 못했습니다. JPG 또는 PNG로 다시 시도해 주세요.'); };
    img.onload = function(){
      try{
        var MAX = 1600, w = img.width, h = img.height;
        if(w > MAX || h > MAX){
          if(w >= h){ h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        var cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        var ctx = cv.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        var out = cv.toDataURL('image/jpeg', 0.8);
        if(!out || out.length < 100) return cb('사진 변환에 실패했습니다.');
        cb(null, out);
      }catch(err){ cb('사진 처리 중 오류가 발생했습니다.'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── 회원 탈퇴 (개인정보 삭제 요구권) ── */
function withdraw(){
  if(!confirm('정말 탈퇴하시겠습니까?\n\n· 프로필, 지원 내역이 모두 삭제됩니다\n· 면허증 사진도 함께 파기됩니다\n· 되돌릴 수 없습니다')) return;
  if(!confirm('마지막 확인입니다.\n\n탈퇴하면 복구할 수 없습니다. 진행할까요?')) return;

  var u = window._auth.currentUser;
  if(!u){ toast('로그인 정보가 없습니다.'); return; }
  var fb = window._fb, db = window._db;
  toast('탈퇴 처리 중입니다...');

  /* 1) 면허증 사진 파기 → 2) 지원 내역 삭제 → 3) 프로필 삭제 → 4) 로그아웃 */
  var imgLeft = false;
  fb.getDoc(fb.doc(db,'drivers',u.uid))
    .then(function(snap){
      var p = snap.exists() ? snap.data() : {};
      if(!p.licenseImgPath) return;
      return fb.deleteObject(fb.ref(window._st, p.licenseImgPath))
        .catch(function(e){
          var c=(e&&e.code)||'';
          if(c==='storage/object-not-found') return;   // 이미 없음
          imgLeft = true;                              // 못 지웠지만 탈퇴는 계속 진행
          console.warn('면허증 사진 삭제 실패:', c);
        });
    })
    .then(function(){
      return fb.getDocs(fb.query(fb.collection(db,'applications'), fb.where('driverId','==',u.uid)));
    })
    .then(function(snap){
      var jobs=[]; snap.forEach(function(d){ jobs.push(fb.deleteDoc(fb.doc(db,'applications',d.id))); });
      return Promise.all(jobs);
    })
    .then(function(){
      /* 면허증을 못 지웠으면, 관리자가 파기하도록 기록만 남기고 프로필은 지운다 */
      if(imgLeft){
        return fb.setDoc(fb.doc(db,'purge_requests',u.uid), {
          uid:u.uid, reason:'withdraw', requestedAt:new Date().toISOString()
        }).catch(function(){});
      }
    })
    .then(function(){ return fb.deleteDoc(fb.doc(db,'drivers',u.uid)); })
    .then(function(){
      clearLocal();
      alert('탈퇴가 완료되었습니다.\n그동안 이용해 주셔서 감사합니다.');
      return window._fb.signOut(window._auth).catch(function(){});
    })
    .then(function(){ location.replace('index.html'); })
    .catch(function(e){ toast('탈퇴 실패: '+((e&&e.code)||e.message)); });
}

function earnSum(){
  var now = new Date();
  var today = now.toISOString().slice(0,10);
  var mon = today.slice(0,7);
  var d0 = 0, dCnt = 0, m0 = 0, mCnt = 0, total = 0, tCnt = 0;
  (quickMine||[]).forEach(function(o){
    if(o.status !== 'done') return;
    var f = Number(o.fare)||0;
    total += f; tCnt++;
    var day = (o.doneAt||'').slice(0,10);
    if(day === today){ d0 += f; dCnt++; }
    if(day.slice(0,7) === mon){ m0 += f; mCnt++; }
  });
  return { today:d0, todayCnt:dCnt, month:m0, monthCnt:mCnt, total:total, totalCnt:tCnt };
}

/* ── 알림음 · 진동 ── */
function enableSound(){
  try{
    var AC = window.AudioContext || window.webkitAudioContext;
    if(!AC){ toast('이 브라우저는 알림음을 지원하지 않습니다.'); return; }
    audioCtx = new AC();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    soundOn = true;
    beep();                       // 켜자마자 한 번 들려준다
    toast('🔔 알림음을 켰습니다.');
    renderMain();
  }catch(e){ toast('알림음을 켤 수 없습니다.'); }
}
function disableSound(){ soundOn = false; toast('알림음을 껐습니다.'); renderMain(); }

function beep(){
  if(!soundOn || !audioCtx) return;
  try{
    if(audioCtx.state === 'suspended') audioCtx.resume();
    var t = audioCtx.currentTime;
    [880, 1320].forEach(function(f, i){
      var osc = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + i*0.18);
      g.gain.exponentialRampToValueAtTime(0.35, t + i*0.18 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i*0.18 + 0.16);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + i*0.18); osc.stop(t + i*0.18 + 0.18);
    });
  }catch(e){}
}
function alertNewOrder(cnt){
  beep();
  try{ if(navigator.vibrate) navigator.vibrate([120, 60, 120]); }catch(e){}
  toast('🔔 새 일감 ' + cnt + '건이 도착했습니다!');

/* 두 좌표 사이 직선거리(km) */
function distKm(lat1, lon1, lat2, lon2){
  var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

  if(!D.agreeGeo){ askGeoDriver(); return; }

  if(!navigator.geolocation){ toast('이 브라우저는 위치를 지원하지 않습니다.'); return; }
  geoBusy = true;
  toast('위치를 확인하는 중입니다...');

    geoBusy = false;

    sortQuick();

    toast('📍 가까운 일감부터 보여드립니다.');

  }, { enableHighAccuracy:true, timeout:10000, maximumAge:0 });

function sortQuick(){
  if(!myPos) return;
  quickOpen.sort(function(a,b){
    var da = a.fromLat ? distKm(myPos.lat,myPos.lon,a.fromLat,a.fromLon) : 9999;
    var db = b.fromLat ? distKm(myPos.lat,myPos.lon,b.fromLat,b.fromLon) : 9999;
    return da - db;
  });
}

/* ═══ 실시간 구독 (새 일감이 들어오면 즉시 화면에 뜬다) ═══ */
var unsubOpen = null, unsubMine = null;
var seenOrders = {};      // 이미 본 주문 (새 것만 소리 알림)
var firstFeed = true;     // 첫 로딩 때는 소리 안 냄

function stopRealtime(){
  try{ if(unsubOpen) unsubOpen(); }catch(e){}
  try{ if(unsubMine) unsubMine(); }catch(e){}
  unsubOpen = unsubMine = null;
}

function startRealtime(){
  var u = window._auth && window._auth.currentUser;
  if(!u || !live()) return;
  var fb = window._fb, db = window._db;
  stopRealtime();
  firstFeed = true;

  /* 대기 중인 일감 — 실시간 */
  unsubOpen = fb.onSnapshot(
    fb.query(fb.collection(db,'orders'), fb.where('status','==','open')),
    function(snap){
      var myVeh = (D.vehicles||[]);
      var fresh = [];
      quickOpen = [];
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id;
        if(myVeh.length && myVeh.indexOf(o.vehicle) < 0) return;   // 내 차량으로 못 감
        quickOpen.push(o);
        if(!seenOrders[o.id]) fresh.push(o);
        seenOrders[o.id] = true;
      });
      quickOpen.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      sortQuick();

      /* 새 일감이 들어왔으면 알림 (첫 로딩은 제외) */
      if(!firstFeed && fresh.length && D.online !== false){
        newOrderIds = {};
        fresh.forEach(function(o){ newOrderIds[o.id] = Date.now(); });
        alertNewOrder(fresh.length);
      }
      firstFeed = false;
      if(window._mode==='main' && (mainTab==='quick'||mainTab==='home'||mainTab==='active')) renderMain();
    },
    function(e){ console.warn('일감 구독 실패', e); }
  );

  /* 내가 수행 중인 일감 — 실시간 */
  unsubMine = fb.onSnapshot(
    fb.query(fb.collection(db,'orders'), fb.where('driverId','==',u.uid)),
    function(snap){
      quickMine = [];
      snap.forEach(function(d){ var o=d.data(); o.id=d.id; quickMine.push(o); });
      if(window._mode==='main' && (mainTab==='quick'||mainTab==='home'||mainTab==='active')) renderMain();
    },
    function(e){ console.warn('내 일감 구독 실패', e); }
  );
}

/* 첫 진입 시 한 번만 (실시간 구독이 이어받는다) */
function loadQuick(){
  var u = window._auth && window._auth.currentUser;
  if(!u || !live()) return Promise.resolve();
  var fb = window._fb, db = window._db;
  var myVeh = (D.vehicles||[]);

  return fb.getDocs(fb.query(fb.collection(db,'orders'), fb.where('status','==','open')))
    .then(function(snap){
      quickOpen = [];
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id;
        seenOrders[o.id] = true;
        if(!myVeh.length || myVeh.indexOf(o.vehicle) >= 0) quickOpen.push(o);
      });
      quickOpen.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      sortQuick();
      return fb.getDocs(fb.query(fb.collection(db,'orders'), fb.where('driverId','==',u.uid)));

function navTo(i){
  var o = quickMine[i]; if(!o) return;
  var pick = (o.status === 'accepted');
  var lat = pick ? o.fromLat : o.toLat;
  var lon = pick ? o.fromLon : o.toLon;
  var nm  = pick ? o.fromName : o.toName;
  if(!lat || !lon){ toast('좌표가 없습니다.'); return; }
  var app = 'tmap://route?goalname='+encodeURIComponent(nm)+'&goalx='+lon+'&goaly='+lat+'&coordType=WGS84GEO';
  var web = 'https://www.tmap.co.kr/tmap2/public/tmap.jsp?rGoName='+encodeURIComponent(nm)+'&rGoX='+lon+'&rGoY='+lat;
  var t = Date.now();
  location.href = app;
  setTimeout(function(){ if(Date.now()-t < 2000) window.open(web,'_blank'); }, 1200);
}

function isExpired(j){
  if(!j || !j.deadline || j.deadline==='채용시 마감') return false;
  var today = new Date().toISOString().slice(0,10);
  return j.deadline < today;
}

  var fb=window._fb;
  fb.getDocs(fb.query(fb.collection(window._db,'jobs'), fb.where('status','==','open')))
    .then(function(snap){
      jobs=[];
      snap.forEach(function(d){ var o=d.data(); o.id=d.id; if(!isExpired(o)) jobs.push(o); });
      return loadMyApps();

    .then(renderMain)
    .catch(function(e){ toast('공고를 불러오지 못했습니다: '+(e.code||e.message)); renderMain(); });

function openJob(i){

    + row('근무형태', esc(curJob.workType)) + row('근무시간', esc(curJob.hours||'-'))
    + row('급여', esc(curJob.pay||'협의')) + row('필요 면허', esc(curJob.license||'무관'))
    + row('차량', esc(curJob.vehicle||'-')) + row('모집인원', esc(curJob.count||'-'))

    + (applied?'disabled':'onclick="applyJob()"')+'>'+(applied?'이미 지원한 공고입니다':'이 공고에 지원하기')+'</button>';

/* ── 알림 문자 (서버가 발송. 앱에는 알리고 키 없음) ── */
function notifySMS(appId, kind){
  var u = window._auth && window._auth.currentUser;
  if(!u || !appId) return Promise.resolve({ok:false});
  return u.getIdToken()
    .then(function(t){
      return fetch('https://cosroad.vercel.app/api/rc-notify', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ idToken:t, appId:appId, kind:kind })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(!j || !j.ok){ console.warn('알림 문자 미발송:', j && j.message); }
      return j || {ok:false};
    })
    .catch(function(e){ console.warn('알림 문자 실패', e); return {ok:false}; });
}

/* ═══ 역할 라우터 ═══ 주소는 roadjob.co.kr 하나. 화면 안에서 기사·업체가 갈립니다. */
var ROLE = 'driver';

function boot(){
  icoDefs();
  /* 업체로 '가입까지 마친' 사람만 업체 화면으로. 그냥 눌러본 사람은 첫 화면 유지 */
  var forceHome = wantHome();      // 한 번만 읽고 즉시 지운다
  if(!forceHome){
    try{
      var _r = localStorage.getItem('rc_role');
      if(_r==='company' && localStorage.getItem('rc_company')){ ROLE='company'; C_boot(); return; }
    }catch(e){}
  }
  ROLE = 'driver';
  if(!live()){ render(); return; }
  D.licenseImg = null;   // 기기에 남은 옛 사진은 절대 쓰지 않는다 (인증 강등 방지)
  window._fb.onAuthStateChanged(window._auth, function(u){
    if(!u){ window._mode='signup'; render(); return; }
    var fb=window._fb;
    fb.getDoc(fb.doc(window._db,'drivers',u.uid)).then(function(s){
      if(s.exists()){
        var p=s.data();
        D.name=p.name; D.phone=p.phone; D.areas=p.areas||[]; D.license=p.license;
        D.vehicles=p.vehicles||[]; D.career=p.career; D.worktypes=p.worktypes||[];
        D.intro=p.intro||''; D.licenseVerify=p.licenseVerify||'none';
        D.agree1=p.agreePrivacy!==false; D.agree2=p.agreeUniqueId!==false;
        D.agree3=p.agreeOpenProfile===true;
        D.insurance=p.insurance===true; D.helmet=p.helmet===true;
        D.agreeGeo=p.agreeGeo===true;
        try{ localStorage.setItem('rc_role','driver'); localStorage.removeItem('rc_company'); }catch(e){}
        save();
        joined = true;
        if(forceHome){ window._mode='signup'; step=0; render(); }
        else enterMain();
      } else {
        /* 아직 가입 안 한 사람. step 을 건드리면 안 된다 —
           인증번호를 막 맞춘 사람(step=code)까지 첫 화면으로 튕겨서 가입이 막힌다.
           「처음 화면으로」는 location.replace 로 새로 열리므로 step 은 이미 0이다. */
        window._mode='signup'; render();
      }
    }).catch(function(){ window._mode='signup'; render(); });
  });
}

function C_makeRecaptcha(){
  try{ if(C_recaptcha) C_recaptcha.clear(); }catch(e){}
  C_recaptcha=null;
  var host=document.getElementById('C_recaptcha');
  if(host && host.parentNode){ var f=document.createElement('div'); f.id='C_recaptcha'; host.parentNode.replaceChild(f,host); }
  C_recaptcha = new window._fb.RecaptchaVerifier(window._auth,'C_recaptcha',{size:'invisible'});
  return C_recaptcha;
}
function C_sendCode(){
  if(!C_valid()||C_busy) return; C_save();
  if(!live()){ next(); return; }
  setBusy(true,'발송 중...');
  try{
    var v=C_makeRecaptcha();
    window._fb.signInWithPhoneNumber(window._auth, '+82'+C.phone.replace(/^0/,''), v)
      .then(function(r){ C_confirmResult=r; setBusy(false,'인증번호 받기'); next(); })
      .catch(function(e){ setBusy(false,'인증번호 받기'); toast('발송 실패: '+(e.code||e.message)); try{v.clear();}catch(_){} C_recaptcha=null; });
  }catch(e){ setBusy(false,'인증번호 받기'); toast('오류: '+e.message); C_recaptcha=null; }
}
function C_verifyCode(){
  if(!C_valid()||C_busy) return;
  if(!live()){ next(); return; }
  setBusy(true,'확인 중...');
  C_confirmResult.confirm(document.getElementById('f-code').value)
    .then(function(){ setBusy(false,'확인'); next(); })
    .catch(function(){ setBusy(false,'확인'); toast('인증번호가 올바르지 않습니다.'); });
}
function C_finish(){
  C_save();
  if(!live()){ next(); return; }
  var u=window._auth.currentUser;
  if(!u){ toast('인증 정보가 없습니다. 다시 시도해 주세요.'); return; }
  setBusy(true,'저장 중...');
  var fb=window._fb;
  fb.setDoc(fb.doc(window._db,'companies',u.uid), {
    uid:u.uid, phone:C.phone, company:C.company, manager:C.manager,

    +'<span class="arw">›</span></div>'
    +(Q.to?'<div style="font-size:12.5px;color:var(--ink-soft);margin:6px 0 0 20px;">'+esc(Q.to.addr)+'</div>'
      +'<input type="text" style="margin-top:8px;" maxlength="40" placeholder="상세주소 (예: 로비 데스크)" value="'+esc(Q.to.detail||'')+'" oninput="Q.to.detail=this.value">':'')

  if(Q.from && Q.to){

      +(surchargeText()?' · <span style="color:var(--orange);font-weight:800;">'+surchargeText()+'</span>':'')+'</div>';
  }

  if(distKmQ){
    h += '<div class="field"><label class="lb">차량 <span class="req">*</span></label><div class="opts" style="grid-template-columns:repeat(3,1fr);">';
    for(var k in FARE){
      var f = FARE[k]; if(!f.on) continue;
      var over = distKmQ > f.maxKm;
      var p = over ? (f.maxKm+'km 이내') : won(calcFare(k, distKmQ));
      h += '<div class="veh '+(Q.vehicle===k?'on':'')+(over?' off':'')+'" '
        + (over?'onclick="toast(\''+k+'는 '+f.maxKm+'km 이내만 가능합니다.\')"':'onclick="pickVehQ(\''+k+'\')"')+'>'
        +'<span class="e">'+f.e+'</span><div class="n">'+k+'</div><div class="p">'+p+'</div></div>';
    }
    h += '</div><div class="hint">'+(FARE[Q.vehicle]?FARE[Q.vehicle].desc+' · '+FARE[Q.vehicle].maxKm+'km 이내':'보낼 물건에 맞는 차량을 골라주세요.')+'</div></div>';

    h += '<div class="field"><label class="lb">무엇을 보내나요? <span class="req">*</span></label>'
      +'<input type="text" maxlength="40" placeholder="예) A4 서류봉투 / 신발 박스 1개" value="'+esc(Q.item)+'" oninput="Q.item=this.value"></div>'
      +'<div class="field"><label class="lb">기사님께 전할 말 <span style="font-weight:400;color:var(--ink-soft);font-size:12.5px;">(선택)</span></label>'

    if(Q.vehicle && fareQ){
      var f2 = FARE[Q.vehicle];
      var extra = distKmQ > f2.baseKm ? Math.ceil(distKmQ - f2.baseKm) * f2.perKm : 0;
      h += '<div class="fare-box"><div style="font-size:13px;opacity:.75;">예상 요금</div>'
        +'<div class="big">'+won(fareQ)+'</div>'
        +'<div style="font-size:12.5px;opacity:.7;margin-top:8px;line-height:1.7;">'
        +'기본 '+won(f2.base)+' ('+f2.baseKm+'km 포함)'
        +(extra?'<br>추가 '+Math.ceil(distKmQ-f2.baseKm)+'km × '+won(f2.perKm)+' = '+won(extra):'')
        +(surchargeText()?'<br>'+surchargeText():'')
        +'</div></div>';
      h += '<button class="btn btn-main" style="margin-top:16px;background:var(--orange);" onclick="submitQuick()">'+won(fareQ)+' · 퀵 보내기</button>';
    }
  }

  h += '<div class="note-mid">💳 <b>요금은 기사님께 직접 결제</b>해 주세요 (현금·계좌이체·간편송금).<br>'

  return h;
},

  var h = '';
  var live_ = myOrders.filter(function(o){ return o.status!=='done' && o.status!=='canceled'; });
  if(live_.length){
    h += '<div style="font-size:13px;font-weight:800;color:var(--orange);margin-bottom:10px;">📦 퀵 '+live_.length+'건</div>';
    h += live_.map(function(o){
      var i = myOrders.indexOf(o), s = OST[o.status]||OST.open;
      return '<div class="card" style="margin-top:0;margin-bottom:12px;">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
        +'<div style="font-size:15px;font-weight:800;line-height:1.5;">'+esc(o.fromName)+' → '+esc(o.toName)+'</div>'
        +'<span style="flex:none;font-size:12px;font-weight:800;padding:5px 11px;border-radius:20px;color:'+s[1]+';background:'+s[2]+';">'+s[0]+'</span></div>'
        +'<div style="font-size:13px;color:var(--ink-soft);margin-top:6px;">'+(C_QVEH[o.vehicle]||'')+' '+esc(o.vehicle)+' · '+esc(o.item)+' · <b style="color:var(--orange);">'+won(o.fare)+'</b></div>'
        + (o.driverName
            ? '<div style="background:var(--navy-soft);border-radius:10px;padding:11px;margin-top:10px;font-size:13px;color:var(--navy);">'
              +'🚚 <b>'+esc(o.driverName)+'</b> 기사님 · '+fmtPhone(o.driverPhone)
              +'<a class="btn btn-main" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box;margin-top:9px;padding:11px;font-size:14px;" href="tel:'+esc(o.driverPhone)+'">📞 전화하기</a></div>'
            : '<div class="hint" style="margin-top:9px;">기사님을 기다리는 중입니다.</div>')
        + (o.status==='open'
            ? '<button class="btn btn-ghost" style="margin-top:10px;padding:11px;font-size:14px;color:#F04438;border-color:#FECDCA;" onclick="cancelOrder('+i+')">주문 취소</button>'
            : '')
        +'</div>';
    }).join('');
    h += '<div style="height:12px;"></div>';
  }
  h += '<div style="font-size:13px;font-weight:800;color:var(--ink-soft);margin-bottom:10px;">💼 지원자</div>';
  h += C_MAIN.apps();
  return h;
},

function loadAll(){
  if(!live()){ C_renderMain(); return; }
  var u=window._auth.currentUser; if(!u) return;
  var fb=window._fb;
  fb.getDocs(fb.query(fb.collection(window._db,'jobs'), fb.where('companyId','==',u.uid)))
   .then(function(s){ myJobs=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; myJobs.push(o); });
     return fb.getDocs(fb.query(fb.collection(window._db,'applications'), fb.where('companyId','==',u.uid))); })
   .then(function(s){ apps=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; apps.push(o); });
     return fb.getDocs(fb.query(fb.collection(window._db,'drivers'), fb.where('agreeOpenProfile','==',true))); })
   .then(function(s){ drivers=[]; s.forEach(function(d){ var o=d.data(); o.id=d.id; drivers.push(o); }); C_renderMain(); })
   .catch(function(e){ toast('불러오기 실패: '+(e.code||e.message)); C_renderMain(); });
}

/* ═══════════════ 📦 퀵 보내기 ═══════════════ */
var C_geoBusy = false;
function askGeo(){
  if(!confirm('「내 위치」를 쓰려면 위치정보 이용에 동의해야 합니다.\n\n· 출발지 주소를 채우는 용도로만 사용합니다\n· 위치는 저장하지 않습니다\n· 언제든 철회할 수 있습니다\n\n동의하시겠습니까?')) return;
  C.agreeGeo = true; C_save(); C_renderMain();
  toast('✅ 동의했습니다. 「내 위치」를 쓸 수 있습니다.');
}
function useMyLocation(){
  if(!C.agreeGeo){ askGeo(); return; }
  if(C_geoBusy) return;
  if(!navigator.geolocation){ toast('이 브라우저는 위치를 지원하지 않습니다.'); return; }

  C_geoBusy = true;
  toast('위치를 확인하는 중입니다...');
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    fetch('https://cosroad.vercel.app/api/rc-quick', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'reverse', lat:lat, lon:lon })
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      C_geoBusy = false;
      if(!j || !j.ok){ toast((j&&j.message)||'주소를 찾지 못했습니다. 직접 검색해 주세요.'); return; }
      var keep = (Q.from && Q.from.detail) || '';
      Q.from = { name:j.name, addr:j.addr, lat:j.lat, lon:j.lon, detail:keep };
      C_save(); recalc();
      toast('📍 내 위치로 설정했습니다.');
    })
    .catch(function(){ C_geoBusy=false; toast('주소 변환에 실패했습니다. 직접 검색해 주세요.'); });
  }, function(err){
    C_geoBusy = false;
    if(err.code === 1) toast('위치 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.');
    else toast('위치를 가져오지 못했습니다. 직접 검색해 주세요.');
  }, { enableHighAccuracy:true, timeout:10000, maximumAge:0 });
}

var NIGHT_RATE = 1.2;   // 22~06시
var WEEKEND_RATE = 1.1; // 토·일
function calcFare(veh, km, when){
  var f = FARE[veh]; if(!f) return 0;
  var fare = f.base;
  if(km > f.baseKm) fare += Math.ceil(km - f.baseKm) * f.perKm;
  var d = when || new Date();
  var h = d.getHours(), w = d.getDay();
  if(h >= 22 || h < 6) fare *= NIGHT_RATE;
  if(w === 0 || w === 6) fare *= WEEKEND_RATE;
  return Math.round(fare / 100) * 100;
}
function surchargeText(when){
  var d = when || new Date();
  var h = d.getHours(), w = d.getDay();
  var t = [];
  if(h >= 22 || h < 6) t.push('심야 +20%');
  if(w === 0 || w === 6) t.push('주말 +10%');
  return t.join(' · ');
}

function recalc(){
  fareQ = 0;
  if(!Q.from || !Q.to){ distKmQ = 0; return; }
  if(calcing) return;
  calcing = true;
  C_renderMain();
  fetch('https://cosroad.vercel.app/api/rc-quick', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'route', sx:Q.from.lon, sy:Q.from.lat, ex:Q.to.lon, ey:Q.to.lat })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    calcing = false;
    if(j && j.ok){
      distKmQ = j.distanceM / 1000;
      timeMinQ = Math.max(1, Math.round(j.timeSec / 60));
      if(Q.vehicle && (!FARE[Q.vehicle] || distKmQ > FARE[Q.vehicle].maxKm)) Q.vehicle = '';
      if(Q.vehicle) fareQ = calcFare(Q.vehicle, distKmQ);
    } else {
      distKmQ = 0;
      toast((j && j.message) || '거리를 계산하지 못했습니다.');
    }
    C_renderMain();
  })
  .catch(function(){
    calcing = false; distKmQ = 0;
    toast('거리 계산에 실패했습니다.');
    C_renderMain();
  });
}
function pickVehQ(k){

  var cnt = apps.filter(function(a){return a.jobId===j.id;}).length;
  var msg = '「'+(j.title||'공고')+'」을(를) 삭제할까요?\n\n되돌릴 수 없습니다.';
  if(cnt) msg += '\n⚠️ 지원자 '+cnt+'명의 지원 내역도 목록에서 사라집니다.';
  if(!confirm(msg)) return;
  var fb=window._fb, db=window._db;
  /* 공고에 딸린 지원·제안 내역도 함께 지운다 (안 지우면 유령 지원서가 남는다) */
  fb.getDocs(fb.query(fb.collection(db,'applications'), fb.where('jobId','==',j.id)))
    .then(function(snap){
      var t=[]; snap.forEach(function(d){ t.push(fb.deleteDoc(fb.doc(db,'applications',d.id))); });
      return Promise.all(t);
    })
    .then(function(){ return fb.deleteDoc(fb.doc(db,'jobs',j.id)); })
    .then(function(){ toast('공고를 삭제했습니다.'); loadAll(); })
    .catch(function(e){ toast('삭제 실패: '+(e.code||e.message)); });
}
/* 마감일이 지났는가 */
/* 공고 수정 — 기존 값을 폼에 채워 넣고 연다 */
var editingJobId = null;
function editJob(i){
  var j = myJobs[i]; if(!j) return;
  editingJobId = j.id;
  JF = {
    title:j.title||'', jobType:j.jobType||'', area:j.area||'', workType:j.workType||'',
    license:j.license||'무관', vehicle:j.vehicle||'회사 차량 제공',
    days:(j.days||[]).slice(),
    slots:(j.slots && j.slots.length) ? j.slots.map(function(x){return {s:x.s,e:x.e};}) : [{s:'',e:''}],
    hours:j.hours||'', count:j.count||'1명',
    deadline:(j.deadline && j.deadline!=='채용시 마감') ? j.deadline : '',
    deadlineOpen:(!j.deadline || j.deadline==='채용시 마감'),
    desc:j.desc||''
  };
  openJobForm();
}

/* ── 지원자 ── */
function openApp(i){
  curApp = apps[i];
  /* 처음 열면 자동으로 '열람함' — 기사가 진행 상황을 알 수 있게 */
  if(curApp && curApp.status==='applied' && curApp.direction!=='offer'){
    var _fb=window._fb;
    _fb.updateDoc(_fb.doc(window._db,'applications',curApp.id), { status:'viewed' })
      .then(function(){ curApp.status='viewed'; loadAll(); })
      .catch(function(){});
  }
  var d = drivers.filter(function(x){ return x.uid===curApp.driverId; })[0] || {};
  var locked = (curApp.status==='accepted' || curApp.status==='declined');
  var STS = locked ? [] : [['viewed','열람함'],['contact','연락중'],['hired','채용확정'],['rejected','미선정']];
  document.getElementById('mTitle').textContent = curApp.driverName+' 기사님';
  document.getElementById('mBody').innerHTML =
     '<div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:12px;">'+esc(curApp.jobTitle)+' 지원</div>'
    + row('연락처','<a href="tel:'+esc(curApp.driverPhone)+'" style="color:var(--navy);font-weight:800;">'+fmtPhone(curApp.driverPhone)+'</a>')
    + row('면허', esc(d.license||'-')) + row('보유 차량', esc((d.vehicles||[]).join(', ')||'-'))
    + row('경력', esc(d.career||'-')) + row('활동 지역', esc((d.areas||[]).join(' · ')||'-'))
    + row('희망 근무형태', esc((d.worktypes||[]).join(', ')||'-'))
    + row('면허 인증', d.licenseVerify==='verified'?'✅ 인증됨':(d.licenseVerify==='pending'?'검수중':'미인증'))
    + (d.intro? '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);white-space:pre-wrap;">'+esc(d.intro)+'</div>':'')
    + '<div class="field" style="margin-top:18px;"><label class="lb">상태 변경</label><div class="opts col2">'
    + STS.map(function(s){ return '<div class="opt '+(curApp.status===s[0]?'on':'')+'" onclick="setAppStatus(\''+s[0]+'\')">'+s[1]+'</div>'; }).join('')
    + '</div></div>'
    + '<a class="btn btn-main" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box;" href="tel:'+esc(curApp.driverPhone)+'">📞 전화하기</a>';
  document.getElementById('modal').classList.add('on');
}
function setAppStatus(s){
  if(!curApp) return;
  var fb=window._fb;
  fb.updateDoc(fb.doc(window._db,'applications',curApp.id), { status:s })
    .then(function(){
      if(s==='hired'||s==='contact'||s==='rejected'){
        notifySMS(curApp.id, s).then(function(j){
          if(j && !j.ok && !j.skipped){ toast('상태는 바뀌었지만 기사 알림 문자는 못 보냈습니다.'); }
        });
      }
      curApp.status=s; toast('상태를 변경했습니다.'); loadAll(); closeModal(); })
    .catch(function(e){ toast('실패: '+(e.code||e.message)); });
}

/* ── 기사 상세 · 제안 ── */
function openDriver(i){
  var d = drivers[i];
  document.getElementById('mTitle').textContent = (d.name||'기사')+' 기사님';
  var openJobs = myJobs.filter(function(j){ return j.status==='open'; });
  document.getElementById('mBody').innerHTML =
     row('면허', esc(d.license||'-')) + row('보유 차량', esc((d.vehicles||[]).join(', ')||'-'))
   + row('경력', esc(d.career||'-')) + row('활동 지역', esc((d.areas||[]).join(' · ')||'-'))
   + row('희망 근무형태', esc((d.worktypes||[]).join(', ')||'-'))
   + row('면허 인증', d.licenseVerify==='verified'?'✅ 인증됨':(d.licenseVerify==='pending'?'검수중':'미인증'))
   + (d.intro? '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);white-space:pre-wrap;">'+esc(d.intro)+'</div>':'')
   + '<div class="field" style="margin-top:18px;"><label class="lb">제안할 공고 선택</label>'
   + (openJobs.length
      ? '<div class="hint" style="margin:0 0 10px;">👆 공고를 누르면 이 기사님께 <b>채용 제안</b>이 발송됩니다.</div>'
        + '<div class="opts">'
        + openJobs.map(function(j,k){
            return '<div class="offer-pick" onclick="sendOffer('+k+','+i+')" title="제안을 보내려면 클릭하세요">'
              +'<span class="ico">📢</span>'
              +'<span class="tt">'+esc(j.title)+'</span>'
              +'<span class="arw">›</span>'
              +'<span class="tip">👆 제안을 보내려면 클릭하세요</span>'
              +'</div>';
          }).join('')
        + '</div>'
      : '<div class="hint">모집중인 공고가 없습니다. 먼저 공고를 등록해 주세요.</div>')
   + '</div>';
  document.getElementById('modal').classList.add('on');
}
function sendOffer(jobIdx, driverIdx){
  var u=window._auth.currentUser, fb=window._fb;
  var openJobs = myJobs.filter(function(x){ return x.status==='open'; });
  var j = openJobs[jobIdx];
  var d = drivers[driverIdx];
  if(!j || !d){ toast('공고 또는 기사 정보를 찾을 수 없습니다.'); return; }
  var jobId = j.id, driverId = d.uid, driverName = d.name, driverPhone = d.phone;
  var dup = apps.some(function(a){ return a.jobId===jobId && a.driverId===driverId; });
  if(dup){ toast('이미 지원/제안된 기사입니다.'); return; }
  fb.addDoc(fb.collection(window._db,'applications'), {
    jobId:jobId, jobTitle:j.title, company:C.company, companyId:u.uid,
    driverId:driverId, driverName:driverName, driverPhone:driverPhone,
    direction:'offer', status:'applied', createdAt: fb.serverTimestamp()
  }).then(function(ref){
    closeModal(); toast('✅ 제안을 보냈습니다!');
    notifySMS(ref.id, 'offer').then(function(j){
      if(j && !j.ok && !j.skipped){ toast('제안은 저장됐지만 기사 알림 문자는 못 보냈습니다.'); }
    });
    loadAll();
  })
    .catch(function(e){ toast('제안 실패: '+(e.code||e.message)); });
}

/* ── 회원 탈퇴 (개인정보 삭제 요구권) ── */
function C_withdraw(){
  if(!confirm('정말 탈퇴하시겠습니까?\n\n· 업체 정보, 등록한 공고, 지원자 내역이 모두 삭제됩니다\n· 되돌릴 수 없습니다')) return;
  if(!confirm('마지막 확인입니다.\n\n탈퇴하면 복구할 수 없습니다. 진행할까요?')) return;

  var u = window._auth.currentUser;
  if(!u){ toast('로그인 정보가 없습니다.'); return; }
  var fb = window._fb, db = window._db;
  toast('탈퇴 처리 중입니다...');

  fb.getDocs(fb.query(fb.collection(db,'jobs'), fb.where('companyId','==',u.uid)))
    .then(function(snap){
      var t=[]; snap.forEach(function(d){ t.push(fb.deleteDoc(fb.doc(db,'jobs',d.id))); });
      return Promise.all(t);
    })
    .then(function(){
      return fb.getDocs(fb.query(fb.collection(db,'applications'), fb.where('companyId','==',u.uid)));
    })
    .then(function(snap){
      var t=[]; snap.forEach(function(d){ t.push(fb.deleteDoc(fb.doc(db,'applications',d.id))); });
      return Promise.all(t);
    })
    .then(function(){ return fb.deleteDoc(fb.doc(db,'companies',u.uid)); })
    .then(function(){
      C_clearLocal();
      alert('탈퇴가 완료되었습니다.\n그동안 이용해 주셔서 감사합니다.');
      return window._fb.signOut(window._auth).catch(function(){});
    })
    .then(function(){ location.replace('index.html'); })
    .catch(function(e){ toast('탈퇴 실패: '+((e&&e.code)||e.message)); });
}

function C_clearLocal(){
  try{
    localStorage.removeItem('rc_role');
    localStorage.removeItem('rc_driver');
    localStorage.removeItem('rc_company');
    localStorage.removeItem('rc_home');
    localStorage.removeItem('rj_goto');
  }catch(e){}
}
function switchRole(){ C_clearLocal(); location.replace('index.html'); }
function C_logout(){
  C_stopRealtime();
  C_clearLocal();
  C = { phone:'', company:'', manager:'', bizType:'', area:'', agree1:false, agree2:false };
  if(live()){
    window._fb.signOut(window._auth)
      .catch(function(){})
      .then(function(){ location.replace('index.html'); });
  } else { location.replace('index.html'); }
}

/* ── 부팅 ── */
/* ═══ 실시간: 지원자가 들어오면 즉시 뜬다 ═══ */
var unsubApps = null, unsubOrders = null;
var lastOStatus = {};
var seenApps = {}, firstApps = true;

function C_stopRealtime(){ try{ if(unsubApps) unsubApps(); }catch(e){} try{ if(unsubOrders) unsubOrders(); }catch(e){} unsubApps=unsubOrders=null; }
function C_startRealtime(){
  var u = window._auth && window._auth.currentUser;
  if(!u || !live()) return;
  var fb = window._fb;
  C_stopRealtime();
  firstApps = true;
  /* 내가 보낸 퀵 — 실시간 */
  unsubOrders = fb.onSnapshot(
    fb.query(fb.collection(window._db,'orders'), fb.where('customerId','==',u.uid)),
    function(snap){
      myOrders = [];
      var changed = null;
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id; myOrders.push(o);
        if(lastOStatus[o.id] && lastOStatus[o.id] !== o.status) changed = o;
        lastOStatus[o.id] = o.status;
      });
      myOrders.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
      if(changed){
        var msg = { accepted:'🚚 기사님이 배정되었습니다!', picked:'📦 물품을 픽업했습니다.',
                    done:'✅ 배송이 완료되었습니다.', canceled:'주문이 취소되었습니다.' }[changed.status];
        if(msg){ toast(msg); try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){} }
      }
      if(mode==='main') C_renderMain();
    },
    function(e){ console.warn('주문 구독 실패', e); }
  );

  unsubApps = fb.onSnapshot(
    fb.query(fb.collection(window._db,'applications'), fb.where('companyId','==',u.uid)),
    function(snap){
      var fresh = 0;
      apps = [];
      snap.forEach(function(d){
        var o = d.data(); o.id = d.id; apps.push(o);
        if(!seenApps[o.id]){ if(!firstApps && o.direction==='apply') fresh++; seenApps[o.id]=true; }
      });
      if(fresh){
        toast('🔔 새 지원자 ' + fresh + '명이 도착했습니다!');
        try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){}
      }
      firstApps = false;
      if(mode==='main') C_renderMain();
    },
    function(e){ console.warn('지원자 구독 실패', e); }
  );
}

/* 그라데이션 정의를 문서에 한 번만 심는다 (아이콘들이 참조) */
function C_boot(){
  icoDefs();
  if(!live()){ C_render(); return; }
  window._fb.onAuthStateChanged(window._auth, function(u){
    if(!u){ mode='signup'; C_render(); return; }
    var fb=window._fb;
    fb.getDoc(fb.doc(window._db,'companies',u.uid)).then(function(s){
      if(s.exists()){
        var p=s.data();
        C.company=p.company; C.manager=p.manager; C.phone=p.phone; C.bizType=p.bizType; C.area=p.area;
        try{ localStorage.setItem('rc_role','company'); localStorage.removeItem('rc_driver'); }catch(e){}
        C_save(); C_enterMain();
      } else { mode='signup'; C_render(); }
    }).catch(function(){ mode='signup'; C_render(); });
  });
}
/* 업체 화면은 라우터(boot)가 ROLE 을 보고 부른다 */

/* 서비스워커 등록은 기사 쪽에 한 번만 */
